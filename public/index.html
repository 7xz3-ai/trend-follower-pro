const TIER_COLOR={MEGA:'#22d3ee',SEMI:'#a78bfa',ETF:'#38bdf8',GRWTH:'#fbbf24'};
const TIMEFRAMES=['tick','1min','5min','15min','30min','1hr','4hr','1day'];
const TF_API={'1min':'1Min','5min':'5Min','15min':'15Min','30min':'30Min','1hr':'1Hour','4hr':'4Hour','1day':'1Day'};
const INITIAL_EQUITY=100000;
const WS_TIMEOUT=4000;

const f2=n=>+Number(n).toFixed(2);
const f4=n=>+Number(n).toFixed(4);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const pctOf=(a,b)=>b===0?0:((a-b)/b)*100;
const usd=n=>'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const pnlFmt=n=>(n>=0?'+':'-')+usd(n);

function getMarketStatus(){
  const now=new Date();
  const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const day=et.getDay(),h=et.getHours(),m=et.getMinutes(),mins=h*60+m;
  const wd=day>=1&&day<=5;
  const isPre=wd&&mins>=240&&mins<570;
  const isOpen=wd&&mins>=570&&mins<960;
  const isAH=wd&&mins>=960&&mins<1200;
  let next='Closed';
  if(isOpen){const d=new Date(et);d.setHours(16,0,0,0);next='Closes '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
  else if(isPre){const d=new Date(et);d.setHours(9,30,0,0);next='Opens '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
  const status=isOpen?'OPEN':isPre?'PRE-MKT':isAH?'AFTER-HRS':'CLOSED';
  return{status,isOpen,isPre,isAH,etTime:et,next};
}

function computeSignal(prev,newPrice){
  const vol=prev.vol??0.02;
  const atr=f2(newPrice*vol);
  const ema9=f2(newPrice*0.9978),ema21=f2(newPrice*0.9942);
  const sma50=f2(newPrice*0.9845),sma200=f2(newPrice*0.9230);
  const prevRsi=prev.rsi??prev.baseRsi??50;
  const rsi=clamp(prevRsi+(50-prevRsi)*0.055+(Math.random()*3.2-1.6),8,92);
  const momentum=pctOf(newPrice,prev.price??newPrice);
  const uptrend=newPrice>ema21&&ema21>sma50&&sma50>sma200;
  const downtrend=newPrice<ema21&&ema21<sma50;
  const rsiScore=rsi>=32&&rsi<=44?1.0:rsi>44&&rsi<=52?0.72:rsi>52&&rsi<=60?0.30:rsi<32?0.18:0.0;
  const trendScore=uptrend?1.0:!downtrend?0.35:0.0;
  const momScore=momentum>0&&momentum<0.55?clamp(momentum/0.3,0,1):momentum>=0.55?0.12:0;
  const emaScore=newPrice>ema9?0.90:0.10;
  const volBonus=vol>=0.035?1.0:vol>=0.020?0.65:0.40;
  const raw=(rsiScore*0.38+trendScore*0.28+momScore*0.18+emaScore*0.10+volBonus*0.06)*100;
  const strength=clamp(raw+(Math.random()*1.8-0.9),0,99);
  let signal='HOLD';
  if(uptrend&&rsi>=26&&rsi<=54&&strength>=50)signal='BUY';
  else if(rsi>=70||downtrend)signal='SELL';
  const stopLoss=signal==='BUY'?f2(newPrice-atr*1.5):null;
  const takeProfit=signal==='BUY'?f2(newPrice+atr*2.5):null;
  const riskReward=stopLoss&&takeProfit?+((takeProfit-newPrice)/(newPrice-stopLoss)).toFixed(2):null;
  return{atr,ema9,ema21,sma50,sma200,rsi:f2(rsi),momentum:+momentum.toFixed(4),uptrend,downtrend,signal,signalStrength:f2(strength),stopLoss,takeProfit,riskReward};
}

function evaluateExit(pos,newPrice,sig,cfg,nowMs){
  const profitPts=newPrice-pos.entryPrice;
  const hwm=Math.max(pos.hwm??pos.entryPrice,newPrice);
  const trailSL=f2(hwm-sig.atr*cfg.trailMult);
  const bestSL=Math.max(pos.stopLoss,trailSL);
  const heldSec=(nowMs-pos.enteredAt)/1000;
  const profInAtrs=profitPts/(pos.atr||1);
  const beSL=profInAtrs>=1.0?Math.max(bestSL,pos.entryPrice):bestSL;
  if(newPrice<=beSL)return{close:true,reason:beSL>=pos.entryPrice?'BREAKEVEN_STOP':'STOP_LOSS',hwm,newSL:beSL};
  if(newPrice>=pos.takeProfit)return{close:true,reason:'TAKE_PROFIT',hwm,newSL:beSL};
  if(sig.rsi>=68&&sig.momentum<0.05&&profInAtrs>=0.8)return{close:true,reason:'RSI_PEAK_EXIT',hwm,newSL:beSL};
  if(profInAtrs>=1.2&&sig.momentum<-0.08)return{close:true,reason:'MOMENTUM_REVERSAL',hwm,newSL:beSL};
  if(profInAtrs>=1.0&&newPrice<sig.ema9)return{close:true,reason:'PROFIT_PROTECT',hwm,newSL:beSL};
  if(heldSec>=cfg.maxHoldSec)return{close:true,reason:'TIME_EXIT',hwm,newSL:beSL};
  return{close:false,reason:null,hwm,newSL:beSL};
}

function generateDemoDay(seed,bars){
  if(bars&&bars.length>0)return bars.map(b=>({t:Math.floor(new Date(b.t).getTime()/1000),o:b.o,h:b.h,l:b.l,c:b.c}));
  const result=[];
  let price=seed.price*(0.97+Math.random()*0.06);
  const baseTs=Math.floor(Date.now()/1000)-23400;
  for(let i=0;i<390;i++){
    const drift=i<60?0.00015:i<200?0.00008:-0.00005;
    price=Math.max(0.01,f2(price*(1+drift+seed.vol*0.28*(Math.random()*2-1))));
    const o=f2(price*(1+(Math.random()-0.5)*0.002));
    const h=f2(Math.max(price,o)*(1+Math.random()*0.003));
    const l=f2(Math.min(price,o)*(1-Math.random()*0.003));
    result.push({t:baseTs+i*60,o,h,l,c:price});
  }
  return result;
}

function getRiskAlerts(portfolio,cfg,equity){
  const alerts=[];
  const cashPct=(portfolio.cash/equity)*100;
  if(cashPct<15)alerts.push({level:'danger',msg:'Cash critical: '+cashPct.toFixed(0)+'%'});
  else if(cashPct<25)alerts.push({level:'warn',msg:'Cash low: '+cashPct.toFixed(0)+'%'});
  const drawdown=pctOf(equity,INITIAL_EQUITY);
  if(drawdown<-5)alerts.push({level:'danger',msg:'Drawdown: '+drawdown.toFixed(1)+'%'});
  else if(drawdown<-2)alerts.push({level:'warn',msg:'Drawdown: '+drawdown.toFixed(1)+'%'});
  if(portfolio.positions.length>=cfg.maxPositions)alerts.push({level:'info',msg:'Max positions ('+cfg.maxPositions+')'});
  portfolio.positions.filter(p=>(p.currentPrice-p.entryPrice)/p.entryPrice<-0.02).forEach(p=>alerts.push({level:'warn',msg:p.symbol+' down '+pctOf(p.currentPrice,p.entryPrice).toFixed(1)+'%'}));
  return alerts;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function StockChart({symbol,livePrice,demoData,isDemoMode}){
  const containerRef=useRef(null);
  const chartRef=useRef(null);
  const seriesRef=useRef(null);
  const markersRef=useRef([]);
  const tickBuf=useRef({});
  const [tf,setTf]=useState('5min');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const seed=SEEDS.find(s=>s.symbol===symbol);

  useEffect(()=>{
    if(!containerRef.current)return;
    const chart=LightweightCharts.createChart(containerRef.current,{
      layout:{background:{color:'#060608'},textColor:'#94a3b8'},
      grid:{vertLines:{color:'#0d0d12'},horzLines:{color:'#0d0d12'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
      rightPriceScale:{borderColor:'#1e293b'},
      timeScale:{borderColor:'#1e293b',timeVisible:true,secondsVisible:true},
      handleScroll:true,handleScale:true,
      width:containerRef.current.clientWidth,
      height:containerRef.current.clientHeight||300,
    });
    const series=chart.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',wickUpColor:'#16a34a',wickDownColor:'#dc2626'});
    chartRef.current=chart;seriesRef.current=series;
    const ro=new ResizeObserver(()=>{if(containerRef.current)chart.applyOptions({width:containerRef.current.clientWidth,height:containerRef.current.clientHeight||300});});
    ro.observe(containerRef.current);
    return()=>{ro.disconnect();chart.remove();};
  },[]);

  useEffect(()=>{
    if(!seriesRef.current)return;
    markersRef.current=[];
    if(isDemoMode&&demoData&&demoData.length>0){
      seriesRef.current.setData(demoData.map(b=>({time:b.t,open:b.o,high:b.h,low:b.l,close:b.c})));
      chartRef.current.timeScale().fitContent();setLoading(false);setErr(null);return;
    }
    if(tf==='tick'){
      tickBuf.current={};
      const now=Math.floor(Date.now()/1000);const bars=[];let p=seed?.price||100;
      for(let i=299;i>=0;i--){p=Math.max(0.01,f2(p*(1+(seed?.vol||0.02)*0.15*(Math.random()*2-1))));bars.push({time:Math.floor((now-i*5)/5)*5,open:p,high:f2(p*1.001),low:f2(p*0.999),close:p});}
      seriesRef.current.setData(bars);chartRef.current.timeScale().fitContent();return;
    }
    setLoading(true);setErr(null);
    fetch('/api/bars/'+symbol+'?timeframe='+(TF_API[tf]||'5Min')+'&limit=300')
      .then(r=>r.json()).then(data=>{
        if(data.error)throw new Error(data.error);
        const bars=(data.bars||[]).map(b=>({time:Math.floor(new Date(b.t).getTime()/1000),open:b.o,high:b.h,low:b.l,close:b.c})).filter(b=>b.time>0).sort((a,b)=>a.time-b.time);
        if(bars.length>0){seriesRef.current.setData(bars);chartRef.current.timeScale().fitContent();}
        else{
          const now=Math.floor(Date.now()/1000);
          const iv={'1min':60,'15min':900,'30min':1800,'1hr':3600,'4hr':14400,'1day':86400}[tf]||300;
          const sb=[];let p=seed?.price||100;
          for(let i=200;i>=0;i--){p=Math.max(0.01,f2(p*(1+(seed?.vol||0.02)*0.5*(Math.random()*2-1))));const o=f2(p*(1+(Math.random()-0.5)*0.005));sb.push({time:now-i*iv,open:o,high:f2(Math.max(p,o)*1.003),low:f2(Math.min(p,o)*0.997),close:p});}
          seriesRef.current.setData(sb);chartRef.current.timeScale().fitContent();setErr('Mkt closed — sim data');
        }
        setLoading(false);
      }).catch(e=>{setErr(e.message);setLoading(false);});
  },[symbol,tf,isDemoMode,demoData,seed]);

  useEffect(()=>{
    if(!seriesRef.current||!livePrice||isDemoMode)return;
    if(tf==='tick'){
      const now=Date.now();const bucket=Math.floor(Math.floor(now/1000)/5)*5;
      const ex=tickBuf.current[bucket];
      if(ex){ex.high=Math.max(ex.high,livePrice);ex.low=Math.min(ex.low,livePrice);ex.close=livePrice;}
      else tickBuf.current[bucket]={time:bucket,open:livePrice,high:livePrice,low:livePrice,close:livePrice};
      try{seriesRef.current.update(tickBuf.current[bucket]);}catch(e){}
    } else {
      try{seriesRef.current.update({time:Math.floor(Date.now()/1000),open:livePrice,high:livePrice,low:livePrice,close:livePrice});}catch(e){}
    }
  },[livePrice,tf,isDemoMode]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px',borderBottom:'1px solid #0f0f14',background:'#07070c',flexWrap:'wrap'}}>
        <span style={{fontWeight:700,color:TIER_COLOR[seed?.tier]||'#22d3ee',fontSize:12}}>{symbol}</span>
        <span style={{color:'#94a3b8',fontSize:11}}>{livePrice?usd(livePrice):'--'}</span>
        {loading&&<span style={{fontSize:7,color:'#475569'}} className="pulse">LOADING</span>}
        {err&&<span style={{fontSize:7,color:'#f59e0b'}}>{err}</span>}
        {isDemoMode&&<span style={{fontSize:7,color:'#a78bfa',border:'1px solid #7c3aed44',padding:'1px 4px'}}>DEMO</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:2,flexWrap:'wrap'}}>
          {TIMEFRAMES.map(t=>(
            <button key={t} onClick={()=>setTf(t)} style={{padding:'1px 4px',fontSize:7,fontWeight:700,border:'1px solid '+(tf===t?'#22d3ee44':'#1a1a2e'),color:tf===t?'#22d3ee':'#334155',background:tf===t?'#0a1f2e':'transparent',cursor:'pointer'}}>
              {t.toUpperCase()}
            </button>
          ))}
        </div>
      </div>
      <div ref={containerRef} style={{flexGrow:1,minHeight:220}}/>
    </div>
  );
}

// ── Equity Curve ──────────────────────────────────────────────────────────────
function EquityCurve({history,currentEquity}){
  const ref=useRef(null);const chartRef=useRef(null);const seriesRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const chart=LightweightCharts.createChart(ref.current,{layout:{background:{color:'#060608'},textColor:'#64748b'},grid:{vertLines:{color:'#0a0a10'},horzLines:{color:'#0a0a10'}},rightPriceScale:{borderColor:'#1e293b'},timeScale:{borderColor:'#1e293b'},width:ref.current.clientWidth,height:ref.current.clientHeight||120});
    const series=chart.addAreaSeries({topColor:'#22c55e33',bottomColor:'#22c55e00',lineColor:'#22c55e',lineWidth:2});
    chartRef.current=chart;seriesRef.current=series;
    const ro=new ResizeObserver(()=>{if(ref.current)chart.applyOptions({width:ref.current.clientWidth,height:ref.current.clientHeight||120});});
    ro.observe(ref.current);return()=>{ro.disconnect();chart.remove();};
  },[]);
  useEffect(()=>{
    if(!seriesRef.current)return;
    let eq=INITIAL_EQUITY;const pts=[{time:Math.floor(Date.now()/1000)-86400,value:INITIAL_EQUITY}];
    [...history].reverse().forEach((t,i)=>{eq+=t.profit;pts.push({time:Math.floor(Date.now()/1000)-86400+(i+1)*300,value:f2(eq)});});
    pts.push({time:Math.floor(Date.now()/1000),value:f2(currentEquity)});
    const sorted=pts.sort((a,b)=>a.time-b.time);
    const deduped=sorted.filter((p,i)=>i===0||p.time!==sorted[i-1].time);
    try{seriesRef.current.setData(deduped);chartRef.current.timeScale().fitContent();}catch(e){}
  },[history,currentEquity]);
  return <div ref={ref} style={{width:'100%',height:'100%',minHeight:100}}/>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [stocks,setStocks]=useState(()=>SEEDS.map(s=>({...s})));
  const [portfolio,setPortfolio]=useState({cash:INITIAL_EQUITY,positions:[],history:[]});
  const [dataMode,setDataMode]=useState('idle');
  const [autoOn,setAutoOn]=useState(false);
  const [tab,setTab]=useState('chart');
  const [mobileTab,setMobileTab]=useState('chart');
  const [selectedSym,setSelectedSym]=useState('NVDA');
  const [sysLog,setSysLog]=useState([]);
  const [sigFilter,setSigFilter]=useState('ALL');
  const [manualAmt,setManualAmt]=useState(2000);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=768);
  const [mktStatus,setMktStatus]=useState(getMarketStatus());
  const [cfg,setCfg]=useState({maxPositions:5,riskPct:1.5,minStrength:66,minRR:1.3,trailMult:0.9,cooldownSec:40,maxHoldSec:360});
  // Demo
  const [demoState,setDemoState]=useState('idle');
  const [demoSym,setDemoSym]=useState('NVDA');
  const [demoMode,setDemoMode]=useState('replay');
  const [demoProgress,setDemoProgress]=useState(0);
  const [demoData,setDemoData]=useState([]);

  const stocksRef=useRef(stocks);const portfolioRef=useRef(portfolio);
  const cfgRef=useRef(cfg);const autoOnRef=useRef(autoOn);
  const cooldowns=useRef({});const wsRef=useRef(null);
  const logBuf=useRef([]);const livePrices=useRef({});
  const demoIdxRef=useRef(0);const demoDataRef=useRef([]);

  stocksRef.current=stocks;portfolioRef.current=portfolio;
  cfgRef.current=cfg;autoOnRef.current=autoOn;demoDataRef.current=demoData;

  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  useEffect(()=>{const id=setInterval(()=>setMktStatus(getMarketStatus()),15000);return()=>clearInterval(id);},[]);
  useEffect(()=>{
    const id=setInterval(()=>{if(!logBuf.current.length)return;const b=[...logBuf.current];logBuf.current=[];setSysLog(p=>[...b,...p].slice(0,150));},600);
    return()=>clearInterval(id);
  },[]);

  const addLog=useCallback((msg,type='info')=>{logBuf.current.push({msg,type,t:new Date().toLocaleTimeString('en-GB',{hour12:false})});},[]);

  const processTick=useCallback((symbol,newPrice)=>{
    livePrices.current[symbol]=newPrice;
    const prev=stocksRef.current.find(s=>s.symbol===symbol);if(!prev)return;
    const sig=computeSignal(prev,newPrice);const now=Date.now();
    setStocks(p=>p.map(s=>s.symbol!==symbol?s:{...s,...sig,price:newPrice,changePercent:+pctOf(newPrice,s.price).toFixed(3),prevPrice:s.price}).sort((a,b)=>{const o={BUY:0,SELL:1,HOLD:2};return(o[a.signal]??2)-(o[b.signal]??2)||b.signalStrength-a.signalStrength}));
    setPortfolio(prev=>{
      if(!prev.positions.some(p=>p.symbol===symbol))return prev;
      let cash=prev.cash;const active=[],newHist=[];
      prev.positions.forEach(pos=>{
        if(pos.symbol!==symbol){active.push(pos);return;}
        const exit=evaluateExit(pos,newPrice,sig,cfgRef.current,now);
        if(exit.close){
          const value=f2(pos.shares*newPrice),profit=f2(value-pos.shares*pos.entryPrice);
          cash+=value;cooldowns.current[pos.symbol]=now;
          newHist.push({symbol:pos.symbol,type:exit.reason,entry:pos.entryPrice,exit:newPrice,profit,rr:pos.riskReward,held:Math.round((now-pos.enteredAt)/1000)+'s',t:new Date().toLocaleTimeString('en-GB',{hour12:false})});
          addLog('['+exit.reason+'] '+pos.symbol+' | '+pnlFmt(profit),profit>=0?'profit':'loss');
        } else active.push({...pos,currentPrice:newPrice,hwm:exit.hwm,stopLoss:exit.newSL});
      });
      return{...prev,cash,positions:active,history:newHist.length?[...newHist,...prev.history]:prev.history};
    });
  },[addLog]);

  // Demo
  const startDemo=useCallback(async(sym,mode)=>{
    setDemoState('loading');setDemoSym(sym);setDemoMode(mode);setDemoProgress(0);demoIdxRef.current=0;
    addLog('[DEMO] Loading data for '+sym+'...','info');
    let bars=[];
    try{
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const ys=yesterday.toISOString().split('T')[0];
      const r=await fetch('/api/bars/'+sym+'?timeframe=1Min&limit=390&start='+ys+'T13:30:00Z&end='+ys+'T20:00:00Z');
      const d=await r.json();
      if(d.bars&&d.bars.length>0){bars=d.bars;addLog('[DEMO] '+bars.length+' real bars loaded','trade');}
      else addLog('[DEMO] No data — synthetic day','warn');
    }catch(e){addLog('[DEMO] API error — synthetic day','warn');}
    const seed=SEEDS.find(s=>s.symbol===sym)||SEEDS[0];
    const data=generateDemoDay(seed,bars);
    setDemoData(data);setDemoState('running');
    addLog('[DEMO] '+(mode==='fast'?'Fast-forward':'Tick replay')+' started','trade');
  },[addLog]);

              <span style={{fontWeight:700,color:autoOn?'#334155':'#e2e8f0'}}>{cfg[k]}{sfx}</span>
            </div>
            <input type="range" min={min} max={max} step={step} value={cfg[k]} disabled={autoOn} onChange={e=>setCfg(p=>({...p,[k]:Number(e.target.value)}))} style={{height:3}}/>
          </div>
        ))}
        <div style={{marginTop:6}}>
          <div style={{fontSize:7,color:'#475569',marginBottom:2}}>Manual $</div>
          <input type="number" value={manualAmt} onChange={e=>setManualAmt(Number(e.target.value))} style={{width:'100%',background:'#0a0a10',border:'1px solid #1e293b',color:'#fbbf24',padding:'3px 7px',fontSize:10}} min="100"/>
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
        <div style={{padding:'5px 10px',fontSize:7,fontWeight:700,color:'#ca8a04',textTransform:'uppercase',letterSpacing:'0.1em',borderBottom:'1px solid #0f0f18'}}>⬡ Top Signals</div>
        <div style={{overflowY:'auto',flex:1,padding:5,display:'flex',flexDirection:'column',gap:4}}>
          {!isActive&&<div style={{color:'#1e293b',fontSize:7,textAlign:'center',padding:12,textTransform:'uppercase'}}>Connect to begin</div>}
          {isActive&&buys.length===0&&<div style={{color:'#1e293b',fontSize:7,textAlign:'center',padding:12,textTransform:'uppercase'}} className="pulse">Scanning...</div>}
          {isActive&&buys.slice(0,5).map(s=>{
            const held=portfolio.positions.some(p=>p.symbol===s.symbol);
            const qual=s.signalStrength>=cfg.minStrength&&(s.riskReward||0)>=cfg.minRR;
            return(
              <div key={s.symbol} style={{border:'1px solid '+(held?'#1e293b':qual?'#16a34a33':'#1e293b'),padding:6,opacity:held?0.4:1,cursor:'pointer'}} onClick={()=>{setSelectedSym(s.symbol);setTab('chart');if(isMobile)setMobileTab('chart');}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span style={{fontSize:6,padding:'1px 3px',border:'1px solid #16a34a',color:'#22c55e',fontWeight:700}}>BUY</span>
                    <span style={{fontWeight:700,color:TIER_COLOR[SEEDS.find(sd=>sd.symbol===s.symbol)?.tier]||'#22d3ee',fontSize:10}}>{s.symbol}</span>
                    {qual&&<span style={{fontSize:6,color:'#22c55e'}}>AUTO✓</span>}
                  </div>
                  <span style={{fontWeight:700,color:'#22c55e',fontSize:9}}>{usd(s.price)}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2,marginBottom:3}}>
                  <div style={{background:'#0a0a10',padding:'2px 4px'}}><div style={{fontSize:6,color:'#334155'}}>SL</div><div style={{color:'#ef4444',fontWeight:700,fontSize:8}}>{usd(s.stopLoss)}</div></div>
                  <div style={{background:'#0a0a10',padding:'2px 4px'}}><div style={{fontSize:6,color:'#334155'}}>TP</div><div style={{color:'#22c55e',fontWeight:700,fontSize:8}}>{usd(s.takeProfit)}</div></div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:3}}>
                  <div style={{flex:1,height:3,background:'#0f0f14',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:s.signalStrength+'%',background:'#22c55e',borderRadius:2,transition:'width 0.3s'}}/></div>
                  <span style={{fontSize:7,color:'#22c55e',fontWeight:700}}>{s.signalStrength.toFixed(0)}%</span>
                  <span style={{fontSize:7,color:'#334155'}}>1:{s.riskReward}</span>
                </div>
                <button onClick={e=>{e.stopPropagation();!held&&manualTrade(s);}} disabled={held} style={{width:'100%',padding:'2px',fontSize:7,fontWeight:700,border:'1px solid '+(held?'#1e293b':'#16a34a'),color:held?'#334155':'#22c55e',background:'transparent',cursor:held?'not-allowed':'pointer'}}>
                  {held?'Open':'Execute'}
                </button>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{maxHeight:120,display:'flex',flexDirection:'column',borderTop:'1px solid #0f0f18'}}>
        <div style={{padding:'3px 10px',fontSize:7,fontWeight:700,color:'#334155',textTransform:'uppercase',letterSpacing:'0.08em'}}>System Log</div>
        <div style={{overflowY:'auto',flex:1,padding:'2px 8px',display:'flex',flexDirection:'column',gap:1}}>
          {sysLog.length===0&&<div style={{color:'#1e293b',fontSize:7,padding:2}}>Awaiting...</div>}
          {sysLog.map((e,i)=>(
            <div key={i} style={{display:'flex',gap:4,fontSize:7,lineHeight:1.6}}>
              <span style={{color:'#1e293b',flexShrink:0}}>{e.t}</span>
              <span style={{wordBreak:'break-all',color:e.type==='trade'?'#22d3ee':e.type==='profit'?'#22c55e':e.type==='loss'?'#ef4444':e.type==='warn'?'#f59e0b':'#475569'}}>{e.msg}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const activeTab=isMobile?mobileTab:tab;
  const setActiveTab=isMobile?setMobileTab:setTab;

  return(
    <div style={{minHeight:'100vh',background:'#050507',display:'flex',flexDirection:'column',maxWidth:'100vw',overflow:'hidden'}}>
      {/* Header */}
      <div style={{background:'#07070c',borderBottom:'1px solid #0f0f18',padding:'6px 10px',display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:modeColor,boxShadow:'0 0 5px '+modeColor}} className={isActive?'pulse':''}/>
          <span style={{fontSize:12,fontWeight:700,letterSpacing:'0.12em',color:'#f1f5f9'}}>TFP</span>
          <span style={{fontSize:7,color:modeColor,border:'1px solid '+modeColor+'44',padding:'1px 5px',fontWeight:700}}>{dataMode==='live'?'LIVE':dataMode==='sim'?'SIM':dataMode==='connecting'?'...':'OFF'}</span>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:mktCol}} className={mktStatus.isOpen?'pulse':''}/>
            <span style={{fontSize:7,color:mktCol,fontWeight:700}}>{mktStatus.status}</span>
            <span style={{fontSize:7,color:'#334155'}}>{mktStatus.etTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'})} ET</span>
            <span style={{fontSize:7,color:'#1e293b'}}>· {mktStatus.next}</span>
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:'auto',flexWrap:'wrap'}}>
          <span style={{fontSize:11,fontWeight:700,color:totalRet>=0?'#22c55e':'#ef4444'}}>${equity.toLocaleString('en-US',{maximumFractionDigits:0})}</span>
          <span style={{fontSize:8,color:totalRet>=0?'#16a34a':'#dc2626'}}>{totalRet>=0?'+':''}{totalRet.toFixed(2)}%</span>
          {riskAlerts.filter(a=>a.level==='danger').length>0&&<span style={{fontSize:7,color:'#ef4444',border:'1px solid #ef444444',padding:'1px 4px'}}>⚠ {riskAlerts.filter(a=>a.level==='danger').length}</span>}
          <button onClick={()=>setAutoOn(p=>{const n=!p;addLog(n?'[ENGINE] Armed':'[ENGINE] Disarmed',n?'trade':'info');return n;})} style={{padding:'3px 8px',fontSize:7,fontWeight:700,border:'1px solid '+(autoOn?'#a78bfa':'#1e293b'),color:autoOn?'#a78bfa':'#64748b',background:'transparent',cursor:'pointer'}}>{autoOn?'■ Disarm':'▶ Arm'}</button>
          {dataMode==='idle'?<button onClick={connectLive} style={{padding:'3px 8px',fontSize:7,fontWeight:700,border:'1px solid #ca8a04',color:'#fbbf24',background:'transparent',cursor:'pointer'}}>Connect</button>:<button onClick={()=>{setDataMode('idle');setAutoOn(false);wsRef.current?.close();addLog('[STREAM] Disc.');}} style={{padding:'3px 8px',fontSize:7,fontWeight:700,border:'1px solid #1e293b',color:'#475569',background:'transparent',cursor:'pointer'}}>Disc.</button>}
        </div>
      </div>

      {/* Risk Alerts */}
      {riskAlerts.length>0&&(
        <div style={{padding:'3px 10px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:'1px solid #0f0f18',background:'#07070c'}}>
          {riskAlerts.map((a,i)=>(
            <span key={i} style={{fontSize:8,color:a.level==='danger'?'#ef4444':a.level==='warn'?'#fbbf24':'#60a5fa',border:'1px solid '+(a.level==='danger'?'#ef444433':a.level==='warn'?'#fbbf2433':'#60a5fa33'),padding:'1px 6px'}}>
              {a.level==='danger'?'🔴':a.level==='warn'?'🟡':'🔵'} {a.msg}
            </span>
          ))}
        </div>
      )}

      {/* KPI bar - hide on mobile */}
      {!isMobile&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:1,background:'#0a0a10',borderBottom:'1px solid #0f0f18',flexShrink:0}}>
          {[
            {l:'EQUITY',v:'$'+equity.toLocaleString('en-US',{maximumFractionDigits:0}),s:(totalRet>=0?'+':'')+totalRet.toFixed(2)+'%',vc:totalRet>=0?'#22c55e':'#ef4444'},
            {l:'OPEN P&L',v:pnlFmt(openPnl),s:portfolio.positions.length+' open',vc:openPnl>=0?'#22c55e':'#ef4444'},
            {l:'REALISED',v:pnlFmt(realPnl),s:closed.length+' trades',vc:realPnl>=0?'#22d3ee':'#ef4444'},
            {l:'WIN RATE',v:winRate!=null?winRate+'%':'--',s:wins+'W '+(closed.length-wins)+'L',vc:'#a78bfa'},
            {l:'CASH',v:'$'+portfolio.cash.toLocaleString('en-US',{maximumFractionDigits:0}),s:((portfolio.cash/equity)*100).toFixed(0)+'%',vc:'#fbbf24'},
            {l:'SIGNALS',v:buys.length+' BUY',s:'of 20',vc:'#facc15'},
          ].map(({l,v,s,vc},i)=>(
            <div key={i} style={{background:'#07070c',padding:'7px 10px'}}>
              <div style={{fontSize:7,textTransform:'uppercase',letterSpacing:'0.1em',color:'#334155',marginBottom:2}}>{l}</div>
              <div style={{fontSize:12,fontWeight:700,color:vc}}>{v}</div>
              <div style={{fontSize:8,color:'#475569',marginTop:1}}>{s}</div>
            </div>
          ))}
        </div>
      )}

      {/* Main body */}
      {isMobile?(
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden'}}>
          <div style={{flex:1,minHeight:0,overflow:'hidden'}}>
            {mobileTab==='chart'&&chartPanel}
            {mobileTab==='screener'&&screenerPanel}
            {mobileTab==='positions'&&positionsPanel}
            {mobileTab==='analytics'&&analyticsPanel}
            {mobileTab==='engine'&&sidebarContent}
            {mobileTab==='log'&&logPanel}
          </div>
          <div style={{display:'flex',background:'#07070c',borderTop:'1px solid #0f0f18'}}>
            {[['chart','📈','Chart'],['screener','⬡','Scan'],['positions','💼','Pos'],['analytics','📊','Stats'],['engine','⚙️','Engine'],['log','📋','Log']].map(([t,icon,label])=>(
              <button key={t} onClick={()=>setMobileTab(t)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1,background:'none',border:'none',cursor:'pointer',padding:'5px 0',borderTop:mobileTab===t?'2px solid #22d3ee':'2px solid transparent'}}>
                <span style={{fontSize:13}}>{icon}</span>
                <span style={{fontSize:6,color:mobileTab===t?'#22d3ee':'#334155',textTransform:'uppercase',fontWeight:700}}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      ):(
        <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 260px',gap:1,background:'#0a0a10',minHeight:0,overflow:'hidden'}}>
          <div style={{display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden'}}>
            <div style={{background:'#07070c',display:'flex',borderBottom:'1px solid #0f0f18',flexShrink:0}}>
              {[['chart','Chart'],['screener','Screener'],['positions','Pos ('+portfolio.positions.length+')'],['analytics','Analytics'],['log','Log ('+closed.length+')']].map(([t,l])=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:'6px 12px',fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',borderBottom:tab===t?'2px solid #22d3ee':'2px solid transparent',color:tab===t?'#22d3ee':'#475569',background:'none',cursor:'pointer',border:'none',borderBottom:tab===t?'2px solid #22d3ee':'2px solid transparent',whiteSpace:'nowrap'}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{flex:1,minHeight:0,overflow:'hidden'}}>
              {tab==='chart'&&chartPanel}
              {tab==='screener'&&screenerPanel}
              {tab==='positions'&&positionsPanel}
              {tab==='analytics'&&analyticsPanel}
              {tab==='log'&&logPanel}
            </div>
          </div>
          <div style={{minHeight:0,overflow:'hidden',background:'#07070c'}}>
            {sidebarContent}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
