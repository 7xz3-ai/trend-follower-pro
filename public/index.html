const f2=n=>+Number(n).toFixed(2);
const f4=n=>+Number(n).toFixed(4);

function getMarketStatus(){
  const now=new Date();
  const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const day=et.getDay(),h=et.getHours(),m=et.getMinutes(),mins=h*60+m;
  const wd=day>=1&&day<=5;
  const isPre=wd&&mins>=240&&mins<570;
  const isOpen=wd&&mins>=570&&mins<960;
  const isAH=wd&&mins>=960&&mins<1200;
  let next='Closed';
  if(isOpen){const d=new Date(et);d.setHours(16,0,0,0);next='Closes '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
  else if(isPre){const d=new Date(et);d.setHours(9,30,0,0);next='Opens '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
  const status=isOpen?'OPEN':isPre?'PRE-MKT':isAH?'AFTER-HRS':'CLOSED';
  return{status,isOpen,isPre,isAH,etTime:et,next};
}

// -- Signal Engine v4 -- decisive, multi-strategy, high trade frequency ---------
function computeSignal(prev,newPrice){
  const vol=prev.vol??0.02;
  const atr=f2(newPrice*vol);

  // Persistent EMA state -- approximate from price history
  const prevEma9=prev.ema9??newPrice,prevEma21=prev.ema21??newPrice;
  const prevEma50=prev.ema50??newPrice,prevEma200=prev.ema200??newPrice;
  const ema9=f2(newPrice*0.2+prevEma9*0.8);
  const ema21=f2(newPrice*0.09+prevEma21*0.91);
  const ema50=f2(newPrice*0.038+prevEma50*0.962);
  const ema200=f2(newPrice*0.01+prevEma200*0.99);
  const ema5=f2(newPrice*0.333+((prev.ema5??newPrice)*0.667));

  // Persistent RSI -- Wilder smoothing approximation
  const prevRsi=prev.rsi??50;
  const chg=newPrice-(prev.price??newPrice);
  const gain=chg>0?chg:0,loss=chg<0?-chg:0;
  const prevAvgGain=prev.avgGain??(atr*0.5),prevAvgLoss=prev.avgLoss??(atr*0.5);
  const avgGain=f4(prevAvgGain*0.857+gain*0.143);
  const avgLoss=f4(prevAvgLoss*0.857+loss*0.143);
  const rs=avgLoss===0?100:avgGain/avgLoss;
  const rsi=f2(clamp(100-(100/(1+rs)),5,95));

  // Momentum -- rate of change over last tick
  const momentum=+pctOf(newPrice,prev.price??newPrice).toFixed(4);

  // Trend classification
  const uptrend=newPrice>ema21&&ema21>ema50&&ema50>ema200;
  const weakUp=newPrice>ema21&&ema21>ema50;
  const downtrend=newPrice<ema21&&ema21<ema50;

  // -- 5 Entry Strategies ----------------------------------------------------
  // PULLBACK: price touched ema9 then bouncing, RSI just reset
  const pullback=weakUp&&newPrice>ema9&&rsi>=32&&rsi<=56&&momentum>-0.08&&momentum<0.20;

  // BREAKOUT: strong candle above all EMAs, RSI not overbought
  const breakout=(vol>=0.020)&&newPrice>ema5&&momentum>0.04&&rsi>=48&&rsi<=72;

  // BOUNCE: RSI washed out, price recovering from low
  const bounce=rsi>=25&&rsi<=44&&momentum>-0.05&&newPrice>ema9*0.998&&!downtrend;

  // CROSS: ema5 freshly above ema9 -- short-term momentum flip
  const cross=ema5>ema9&&newPrice>ema9&&rsi>=38&&rsi<=68&&momentum>=0;

  // SCALP: any conditions just price above ema21 with positive momentum
  const scalp=newPrice>ema21&&momentum>0.01&&rsi>=35&&rsi<=65&&!downtrend;

  // Score -- higher base scores so more trades fire
  const s1=pullback?(0.62+clamp((56-rsi)/56,0,0.25)+clamp(vol/0.05,0,0.13)):0;
  const s2=breakout?(0.60+clamp(momentum/0.3,0,0.22)+clamp(vol/0.06,0,0.13)):0;
  const s3=bounce?(0.60+clamp((44-rsi)/44,0,0.25)+clamp(vol/0.05,0,0.10)):0;
  const s4=cross?(0.56+clamp(momentum/0.25,0,0.22)+clamp(vol/0.05,0,0.12)):0;
  const s5=scalp?(0.50+clamp(momentum/0.20,0,0.20)+clamp(vol/0.06,0,0.10)):0;

  const bestScore=Math.max(s1,s2,s3,s4,s5);
  const entryType=bestScore===s1?'PULLBACK':bestScore===s2?'BREAKOUT':bestScore===s3?'BOUNCE':bestScore===s4?'CROSS':'SCALP';
  const strength=clamp(bestScore*100,10,98);

  // Signal -- fire BUY on any qualifying strategy, not downtrend
  let signal='HOLD';
  if(bestScore>=0.50&&!downtrend)signal='BUY';
  else if(rsi>=75||(downtrend&&momentum<-0.10))signal='SELL';

  // SL/TP per strategy -- tighter on scalps, wider on breakouts
  const slMult={PULLBACK:1.1,BREAKOUT:0.9,BOUNCE:1.3,CROSS:1.0,SCALP:0.7}[entryType]||1.0;
  const tpMult={PULLBACK:2.2,BREAKOUT:3.0,BOUNCE:1.8,CROSS:2.0,SCALP:1.4}[entryType]||2.0;
  const stopLoss=signal==='BUY'?f2(newPrice-atr*slMult):null;
  const takeProfit=signal==='BUY'?f2(newPrice+atr*tpMult):null;
  const riskReward=stopLoss&&takeProfit?+((takeProfit-newPrice)/(newPrice-stopLoss)).toFixed(2):null;

  return{atr,ema5,ema9,ema21,ema50,ema200,avgGain,avgLoss,
    rsi,momentum,uptrend,weakUp,downtrend,
    signal,signalStrength:f2(strength),entryType:signal==='BUY'?entryType:null,
    stopLoss,takeProfit,riskReward};
}

function evaluateExit(pos,newPrice,sig,cfg,nowMs){
  const profitPts=newPrice-pos.entryPrice;
  const atr=pos.atr||f2(pos.entryPrice*0.02);
  const hwm=Math.max(pos.hwm??pos.entryPrice,newPrice);
  const heldSec=(nowMs-pos.enteredAt)/1000;
  const profInAtrs=profitPts/atr;

  // Trailing stop: starts at original SL, tightens as price moves up
  const trailSL=f2(hwm-atr*(pos.trailMult||1.0));
  let activeSL=Math.max(pos.stopLoss,trailSL);

  // -- Move to BREAKEVEN once 1.0 ATR in profit ------------------------------
  // This is the critical rule: once we're up 1 ATR, we cannot lose money
  if(profInAtrs>=1.0){
    activeSL=Math.max(activeSL, pos.entryPrice+f2(atr*0.1)); // just above entry
  }
  // -- Lock in 50% of profit once 2.0 ATRs ahead -----------------------------
  if(profInAtrs>=2.0){
    const halfProfit=pos.entryPrice+f2(profitPts*0.5);
    activeSL=Math.max(activeSL, halfProfit);
  }

  // Hard stop hit
  if(newPrice<=activeSL){
    const reason=activeSL>pos.entryPrice+atr*0.05?'BREAKEVEN_STOP':
                 activeSL>pos.entryPrice?'TRAILING_STOP':'STOP_LOSS';
    return{close:true,reason,hwm,newSL:activeSL};
  }
  // Take profit hit
  if(newPrice>=pos.takeProfit)return{close:true,reason:'TAKE_PROFIT',hwm,newSL:activeSL};
  // RSI overbought AND momentum fading AND we have decent profit - exit
  if(sig.rsi>=70&&sig.momentum<=0.01&&profInAtrs>=1.5)
    return{close:true,reason:'RSI_EXIT',hwm,newSL:activeSL};
  // Strong momentum reversal with profit - protect it
  if(profInAtrs>=1.0&&sig.momentum<-0.06)
    return{close:true,reason:'MOMENTUM_REVERSAL',hwm,newSL:activeSL};
  // Price fell back below EMA9 after good run
  if(profInAtrs>=1.0&&newPrice<sig.ema9&&sig.momentum<0)
    return{close:true,reason:'PROFIT_PROTECT',hwm,newSL:activeSL};
  // Max hold time
  if(heldSec>=cfg.maxHoldSec)return{close:true,reason:'TIME_EXIT',hwm,newSL:activeSL};
  return{close:false,reason:null,hwm,newSL:activeSL};
}

// Generate realistic intraday bars for ONE symbol with a market-regime bias
function generateSymbolDay(seed,realBars,marketBias){
  if(realBars&&realBars.length>0)
    return realBars.map(b=>({t:Math.floor(new Date(b.t).getTime()/1000),o:b.o,h:b.h,l:b.l,c:b.c}));
  const result=[];
  // Each symbol has its own character: some trend up, some chop, some down
  const symBias=marketBias+(Math.random()-0.5)*0.0004;
  let price=seed.price*(0.985+Math.random()*0.03);
  const baseTs=Math.floor(Date.now()/1000)-23400; // 6.5 hours ago = 9:30 ET
  // Build intraday regime: open range (0-30), trend (30-200), reversal (200-390)
  for(let i=0;i<390;i++){
    const phase=i<30?'open':i<200?'trend':'late';
    const phaseDrift={
      open:symBias*0.5+(Math.random()-0.48)*0.0006,
      trend:symBias+(Math.random()-0.45)*0.0003,
      late:symBias*0.3+(Math.random()-0.52)*0.0004,
    }[phase];
    const noise=seed.vol*0.18*(Math.random()*2-1);
    price=Math.max(0.01,f2(price*(1+phaseDrift+noise)));
    const spread=price*seed.vol*0.08;
    const o=f2(price+(Math.random()-0.5)*spread);
    const h=f2(Math.max(price,o)*(1+Math.random()*seed.vol*0.1));
    const l=f2(Math.min(price,o)*(1-Math.random()*seed.vol*0.1));
    result.push({t:baseTs+i*60,o,h,l,c:price});
  }
  return result;
}

function getRiskAlerts(portfolio,cfg,equity){
  const alerts=[];
  const cashPct=(portfolio.cash/equity)*100;
  if(cashPct<15)alerts.push({level:'danger',msg:'Cash critical: '+cashPct.toFixed(0)+'%'});
  else if(cashPct<25)alerts.push({level:'warn',msg:'Cash low: '+cashPct.toFixed(0)+'%'});
  const drawdown=pctOf(equity,INITIAL_EQUITY);
  if(drawdown<-5)alerts.push({level:'danger',msg:'Drawdown: '+drawdown.toFixed(1)+'%'});
  else if(drawdown<-2)alerts.push({level:'warn',msg:'Drawdown: '+drawdown.toFixed(1)+'%'});
  if(portfolio.positions.length>=cfg.maxPositions)alerts.push({level:'info',msg:'Max positions ('+cfg.maxPositions+')'});
  portfolio.positions.filter(p=>(p.currentPrice-p.entryPrice)/p.entryPrice<-0.02).forEach(p=>alerts.push({level:'warn',msg:p.symbol+' down '+pctOf(p.currentPrice,p.entryPrice).toFixed(1)+'%'}));
  return alerts;
}

// -- Chart ---------------------------------------------------------------------
function StockChart({symbol,livePrice,demoData,isDemoMode}){
  const containerRef=useRef(null);
  const chartRef=useRef(null);
  const seriesRef=useRef(null);
  const markersRef=useRef([]);
  const tickBuf=useRef({});
  const [tf,setTf]=useState('1day');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const seed=SEEDS.find(s=>s.symbol===symbol);

  useEffect(()=>{
    if(!containerRef.current)return;
    const chart=LightweightCharts.createChart(containerRef.current,{
      layout:{background:{color:'#060608'},textColor:'#94a3b8'},
      grid:{vertLines:{color:'#0d0d12'},horzLines:{color:'#0d0d12'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
      rightPriceScale:{borderColor:'#1e293b'},
      timeScale:{borderColor:'#1e293b',timeVisible:true,secondsVisible:true},
      handleScroll:true,handleScale:true,
      width:containerRef.current.clientWidth,
      height:containerRef.current.clientHeight||300,
    });
    const series=chart.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',wickUpColor:'#16a34a',wickDownColor:'#dc2626'});
    chartRef.current=chart;seriesRef.current=series;
    const ro=new ResizeObserver(()=>{if(containerRef.current)chart.applyOptions({width:containerRef.current.clientWidth,height:containerRef.current.clientHeight||300});});
    ro.observe(containerRef.current);
    return()=>{ro.disconnect();chart.remove();};
  },[]);

  useEffect(()=>{
    if(!seriesRef.current)return;
    markersRef.current=[];
    if(isDemoMode&&demoData&&demoData.length>0){
      seriesRef.current.setData(demoData.map(b=>({time:b.t,open:b.o,high:b.h,low:b.l,close:b.c})));
      chartRef.current.timeScale().fitContent();setLoading(false);setErr(null);return;
    }
    if(tf==='tick'){
      tickBuf.current={};
      const now=Math.floor(Date.now()/1000);const bars=[];let p=seed?.price||100;
      for(let i=299;i>=0;i--){p=Math.max(0.01,f2(p*(1+(seed?.vol||0.02)*0.15*(Math.random()*2-1))));bars.push({time:Math.floor((now-i*5)/5)*5,open:p,high:f2(p*1.001),low:f2(p*0.999),close:p});}
      seriesRef.current.setData(bars);chartRef.current.timeScale().fitContent();return;
    }
    setLoading(true);setErr(null);
    // Route 1W/1M/1day to the paginated history endpoint (30+ days of data)
    const useHistory=(tf==='1day'||tf==='1W'||tf==='1M');
    const days=tf==='1M'?30:tf==='1W'?7:30;
    const histTf=tf==='1W'?'1Hour':'1Day';
    const url=useHistory
      ?api('/api/history/'+symbol+'?timeframe='+histTf+'&days='+days)
      :api('/api/bars/'+symbol+'?timeframe='+(TF_API[tf]||'5Min')+'&limit=390');
    fetch(url)
      .then(r=>r.json()).then(data=>{
        if(data.error)throw new Error(data.error);
        // History endpoint returns {bars:[...]}, bars endpoint also {bars:[...]}
        const raw=data.bars||[];
        const bars=raw.map(b=>({
          time:Math.floor(new Date(b.t).getTime()/1000),
          open:b.o,high:b.h,low:b.l,close:b.c
        })).filter(b=>b.time>0&&b.open>0&&b.high>0&&b.low>0&&b.close>0)
           .sort((a,b2)=>a.time-b2.time);
        if(bars.length>0){
          seriesRef.current.setData(bars);
          chartRef.current.timeScale().fitContent();
          chartRef.current.timeScale().scrollToRealTime();
        } else {
          // Synthetic fallback - generate realistic multi-day data
          const now=Math.floor(Date.now()/1000);
          const iv={'1min':60,'5min':300,'15min':900,'30min':1800,'1hr':3600,'4hr':14400,'1day':86400,'1W':3600,'1M':86400}[tf]||300;
          const count=useHistory?(days*(tf==='1W'?8:1)):200;
          const sb=[];let p=seed?.price||100;
          for(let i=count;i>=0;i--){
            const drift=0.0002*(Math.random()-0.48);
            p=Math.max(0.01,f2(p*(1+drift+(seed?.vol||0.02)*0.4*(Math.random()*2-1))));
            const o=f2(p*(1+(Math.random()-0.5)*0.006));
            sb.push({time:now-i*iv,open:o,high:f2(Math.max(p,o)*(1+Math.random()*(seed?.vol||0.02)*0.5)),low:f2(Math.min(p,o)*(1-Math.random()*(seed?.vol||0.02)*0.5)),close:p});
          }
          seriesRef.current.setData(sb);chartRef.current.timeScale().fitContent();
          setErr('No API data -- synthetic');
        }
        setLoading(false);
      }).catch(e=>{setErr(e.message);setLoading(false);});
  },[symbol,tf,isDemoMode,demoData,seed]);

  useEffect(()=>{
    if(!seriesRef.current||!livePrice||isDemoMode)return;
    if(tf==='tick'){
      const now=Date.now();const bucket=Math.floor(Math.floor(now/1000)/5)*5;
      const ex=tickBuf.current[bucket];
      if(ex){ex.high=Math.max(ex.high,livePrice);ex.low=Math.min(ex.low,livePrice);ex.close=livePrice;}
      else tickBuf.current[bucket]={time:bucket,open:livePrice,high:livePrice,low:livePrice,close:livePrice};
      try{seriesRef.current.update(tickBuf.current[bucket]);}catch(e){}
    } else {
      try{seriesRef.current.update({time:Math.floor(Date.now()/1000),open:livePrice,high:livePrice,low:livePrice,close:livePrice});}catch(e){}
    }
  },[livePrice,tf,isDemoMode]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px',borderBottom:'1px solid #0f0f14',background:'#07070c',flexWrap:'wrap'}}>
        <span style={{fontWeight:700,color:TIER_COLOR[seed?.tier]||'#22d3ee',fontSize:12}}>{symbol}</span>
        <span style={{color:'#94a3b8',fontSize:11}}>{livePrice?usd(livePrice):'--'}</span>
        {loading&&<span style={{fontSize:7,color:'#475569'}} className="pulse">LOADING</span>}
        {err&&<span style={{fontSize:7,color:'#f59e0b'}}>{err}</span>}
        {isDemoMode&&<span style={{fontSize:7,color:'#a78bfa',border:'1px solid #7c3aed44',padding:'1px 4px'}}>DEMO</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:2,flexWrap:'wrap'}}>
          {TIMEFRAMES.map(t=>(
            <button key={t} onClick={()=>setTf(t)} style={{padding:'3px 7px',fontSize:10,fontWeight:700,border:'1px solid '+(tf===t?'#22d3ee66':'#1a1a2e'),color:tf===t?'#22d3ee':'#475569',background:tf===t?'#0a1f2e':'transparent',cursor:'pointer',borderRadius:3,whiteSpace:'nowrap'}}>
              {t.toUpperCase()}
            </button>
          ))}
        </div>
      </div>
      <div ref={containerRef} style={{flexGrow:1,minHeight:220}}/>
    </div>
  );
}

// -- Equity Curve --------------------------------------------------------------
function EquityCurve({history,currentEquity}){
  const ref=useRef(null);const chartRef=useRef(null);const seriesRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const chart=LightweightCharts.createChart(ref.current,{
      layout:{background:{color:'#060608'},textColor:'#64748b'},
      grid:{vertLines:{color:'#0a0a10'},horzLines:{color:'#0a0a10'}},
      rightPriceScale:{borderColor:'#1e293b'},
      timeScale:{borderColor:'#1e293b',timeVisible:true},
      width:ref.current.clientWidth,height:ref.current.clientHeight||130,
    });
    const series=chart.addAreaSeries({
      topColor:'#22c55e33',bottomColor:'#22c55e00',
      lineColor:'#22c55e',lineWidth:2,
    });
    chartRef.current=chart;seriesRef.current=series;
    const ro=new ResizeObserver(()=>{if(ref.current)chart.applyOptions({width:ref.current.clientWidth,height:ref.current.clientHeight||130});});
    ro.observe(ref.current);return()=>{ro.disconnect();chart.remove();};
  },[]);

  useEffect(()=>{
    if(!seriesRef.current)return;
    // history is stored newest-first; reverse to get chronological order
    const chrono=[...history].reverse();
    // Starting point: INITIAL_EQUITY at a synthetic t-minus-1 second before first trade
    const firstTs=chrono.length&&chrono[0].ts?chrono[0].ts-1000:Date.now()-86400000;
    const pts=[{time:Math.floor(firstTs/1000),value:INITIAL_EQUITY}];
    let eq=INITIAL_EQUITY;
    chrono.forEach(t=>{
      eq=f2(eq+t.profit);
      // Use real ts if present; fall back to current time (handles old entries without ts)
      const tSec=t.ts?Math.floor(t.ts/1000):Math.floor(Date.now()/1000);
      pts.push({time:tSec,value:eq});
    });
    // Append live equity as the rightmost point at "now"
    const nowSec=Math.floor(Date.now()/1000);
    if(!pts.length||pts[pts.length-1].time<nowSec)
      pts.push({time:nowSec,value:f2(currentEquity)});
    // Deduplicate: lightweight-charts requires strictly ascending unique times
    const seen=new Set();const deduped=[];
    pts.sort((a,b)=>a.time-b.time).forEach(p=>{
      if(!seen.has(p.time)){seen.add(p.time);deduped.push(p);}
    });
    // Colour the line red if we're below starting equity
    const finalVal=deduped[deduped.length-1]?.value||INITIAL_EQUITY;
    const isDown=finalVal<INITIAL_EQUITY;
    seriesRef.current.applyOptions({
      lineColor:isDown?'#ef4444':'#22c55e',
      topColor:isDown?'#ef444433':'#22c55e33',
      bottomColor:isDown?'#ef444400':'#22c55e00',
    });
    try{seriesRef.current.setData(deduped);chartRef.current.timeScale().fitContent();}catch(e){}
  },[history,currentEquity]);

  return <div ref={ref} style={{width:'100%',height:'100%',minHeight:130}}/>;
}

  useEffect(()=>{

      layout:{background:{color:'#060608'},textColor:'#94a3b8'},
      grid:{vertLines:{color:'#0d0d12'},horzLines:{color:'#0d0d12'}},

  // Fetch bars for selected symbol
  const fetchBars=useCallback(()=>{
    setLoading(true);setErr(null);
    fetch(api('/api/history/'+sym+'?timeframe='+tf+'&days='+days))
      .then(r=>r.json())
      .then(data=>{
        if(data.error)throw new Error(data.error);
        const mapped=(data.bars||[]).map(b=>({time:Math.floor(new Date(b.t).getTime()/1000),open:b.o,high:b.h,low:b.l,close:b.c,volume:b.v})).sort((a,b)=>a.time-b.time);

        Object.entries(data.snapshot||{}).forEach(([sym,bars])=>{
          if(!bars||bars.length<2)return;
          const first=bars[0],last=bars[bars.length-1];
          const change=((last.c-first.o)/first.o)*100;
          const high=Math.max(...bars.map(b=>b.h));
          const low=Math.min(...bars.map(b=>b.l));
          const avgVol=bars.reduce((a,b)=>a+(b.v||0),0)/bars.length;

    const downDays=changes.filter(c=>c<=0).length;
    const totalReturn=((bars[bars.length-1].close-bars[0].open)/bars[0].open)*100;
    const high=Math.max(...bars.map(b=>b.high));
    const low=Math.min(...bars.map(b=>b.low));
    const avgChange=changes.reduce((a,c)=>a+c,0)/changes.length;

// -- Helpers --------------------------------------------------------------------
// Normalize an Alpaca position (from /api/positions or trade_update) into our
// internal shape so all rendering code stays unchanged.
function normalizePosition(p) {
  const entry = p.avg_entry_price || p.filled_avg_price || 0;
  const rr = p.sl && p.tp && entry
    ? +((p.tp - entry) / (entry - p.sl)).toFixed(2) : null;
  return {
    id:           p.id || p.order_id || p.asset_id,
    symbol:       p.symbol,
    shares:       p.qty || p.filled_qty,
    entryPrice:   entry,
    currentPrice: p.current_price || entry,
    stopLoss:     p.sl   || null,
    takeProfit:   p.tp   || null,
    hwm:          entry,
    riskReward:   rr,
    entryType:    null,
    isAuto:       p.isAuto || false,
    enteredAt:    p.entered_at ? new Date(p.entered_at).getTime() : Date.now(),
    t:            new Date(p.entered_at||Date.now()).toLocaleTimeString('en-GB',{hour12:false})
  };
}

// Derive a human-readable exit type from a trade_update sell fill
function deriveExitType(update) {
  if (update.order_type === 'stop')   return 'STOP_LOSS';
  if (update.order_type === 'limit')  return 'TAKE_PROFIT';
  if (update.order_type === 'market') return 'MANUAL_EXIT';
  return 'EXIT';
}

function App(){
  // -- Core state --------------------------------------------------------------
  // portfolio.cash / equity / buying_power are always sourced from Alpaca in
  // live mode, or simulated locally in demo mode.
  const [portfolio,setPortfolio]=useState({
    cash:0,equity:0,buying_power:0,
    positions:[],history:[],
    loaded:false // true once /api/account returns
  });
  const [stocks,setStocks]=useState(()=>SEEDS.map(s=>({...s})));
  const [dataMode,setDataMode]=useState('idle');   // idle|connecting|live|sim|demo
  const [autoOn,setAutoOn]=useState(false);
  const [tab,setTab]=useState('screener');
  const [mobileTab,setMobileTab]=useState('chart');
  const [selectedSym,setSelectedSym]=useState('NVDA');
  const [sysLog,setSysLog]=useState([]);
  const [sigFilter,setSigFilter]=useState('ALL');
  const [manualAmt,setManualAmt]=useState(2000);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=768);
  const [mktStatus,setMktStatus]=useState(getMarketStatus());
  const [cfg,setCfg]=useState({maxPositions:8,minStrength:45,trailMult:0.8,cooldownSec:15,maxHoldSec:180});
  // Demo
  const [demoState,setDemoState]=useState('idle');

  const [demoProgress,setDemoProgress]=useState(0);

  // Backtest
  const [btMode,setBtMode]=useState('live');       // 'live' | 'backtest'
  const [btTrades,setBtTrades]=useState([]);
  const [btSummary,setBtSummary]=useState(null);
  const [btRunning,setBtRunning]=useState(false);
  const [btError,setBtError]=useState(null);
  const [btCfg,setBtCfg]=useState({days:30,timeframe:'5Min',posAmt:2000,maxPositions:8,minStrength:45});

  // -- Refs --------------------------------------------------------------------
  const stocksRef=useRef(stocks);const portfolioRef=useRef(portfolio);
  const cfgRef=useRef(cfg);const autoOnRef=useRef(autoOn);
  const manualAmtRef=useRef(manualAmt);
  const dataModeRef=useRef(dataMode);  // needed inside processTick without stale closure
  const cooldowns=useRef({});const wsRef=useRef(null);
  const logBuf=useRef([]);const livePrices=useRef({});
  const demoIdxRef=useRef(0);
  const demoAllDataRef=useRef({});
  const demoAutoRef=useRef(true);
  // Tracks symbols for which we've submitted an order but haven't received fill yet.

  // Keep all refs in sync every render
  stocksRef.current=stocks;portfolioRef.current=portfolio;
  cfgRef.current=cfg;autoOnRef.current=autoOn;
  dataModeRef.current=dataMode;
  demoAutoRef.current=demoAutoOn;manualAmtRef.current=manualAmt;

  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  useEffect(()=>{const id=setInterval(()=>setMktStatus(getMarketStatus()),15000);return()=>clearInterval(id);},[]);

  // Log buffer flush --- batches log entries to avoid render storms
  useEffect(()=>{
    const id=setInterval(()=>{if(!logBuf.current.length)return;const b=[...logBuf.current];logBuf.current=[];setSysLog(p=>[...b,...p].slice(0,200));},600);
    return()=>clearInterval(id);
  },[]);

  const addLog=useCallback((msg,type='info')=>{
    logBuf.current.unshift({msg,type,t:new Date().toLocaleTimeString('en-GB',{hour12:false})});
  },[]);

  // -- Account load from Alpaca ------------------------------------------------
  // Called on initial connect and after every trade fill to sync real balance.
  const refreshAccount=useCallback(async()=>{
    if(dataModeRef.current==='demo')return;
    try{
      const [acctResp,posResp]=await Promise.all([
        fetch(api('/api/account')),fetch(api('/api/positions'))
      ]);
      const acct=await acctResp.json();
      const rawPos=await posResp.json();
      if(acct.error){addLog('[ACCOUNT] '+acct.error,'warn');return;}
      const positions=Array.isArray(rawPos)?rawPos.map(normalizePosition):[];
      // Merge live prices into positions we already have in state
      positions.forEach(p=>{
        const lp=livePrices.current[p.symbol];
        if(lp)p.currentPrice=lp;
      });
      setPortfolio(prev=>({
        ...prev,
        cash:acct.cash,
        equity:acct.equity,

        ' | '+positions.length+' open position'+(positions.length===1?'':'s'),'trade');

      addLog('[ACCOUNT] Error: '+e.message,'warn');
    }
  },[addLog]);

  // -- processTick -------------------------------------------------------------
  // In LIVE mode: updates signal state + position display price ONLY.
  //   --- Exits are handled by Alpaca bracket orders on their servers.
  // In DEMO mode: full client-side exit evaluation (unchanged from v6).
  const processTick=useCallback((symbol,newPrice)=>{
    livePrices.current[symbol]=newPrice;
    const prev=stocksRef.current.find(s=>s.symbol===symbol);if(!prev)return;
    const sig=computeSignal(prev,newPrice);const now=Date.now();
    setStocks(p=>p.map(s=>s.symbol!==symbol?s:{
      ...s,...sig,price:newPrice,
      changePercent:+pctOf(newPrice,s.price).toFixed(3),prevPrice:s.price
    }).sort((a,b)=>{const o={BUY:0,SELL:1,HOLD:2};return(o[a.signal]??2)-(o[b.signal]??2)||b.signalStrength-a.signalStrength}));

    setPortfolio(prev=>{
      if(!prev.positions.some(p=>p.symbol===symbol))return prev;

      // LIVE mode: just update current price for P&L display.
      // Alpaca bracket orders handle exits server-side without browser involvement.
      if(dataModeRef.current!=='demo'){
        return{...prev,positions:prev.positions.map(p=>
          p.symbol!==symbol?p:{...p,currentPrice:newPrice}
        )};
      }

      // DEMO mode: full client-side exit evaluation
      let cash=prev.cash;const active=[],newHist=[];
      prev.positions.forEach(pos=>{
        if(pos.symbol!==symbol){active.push(pos);return;}
        const exit=evaluateExit(pos,newPrice,sig,cfgRef.current,now);
        if(exit.close){
          const value=f2(pos.shares*newPrice),profit=f2(value-pos.shares*pos.entryPrice);
          cash+=value;cooldowns.current[pos.symbol]=now;
          newHist.push({symbol:pos.symbol,type:exit.reason,entry:pos.entryPrice,exit:newPrice,
            profit,rr:pos.riskReward,held:Math.round((now-pos.enteredAt)/1000)+'s',
            strategy:pos.entryType||null,ts:now,
            t:new Date().toLocaleTimeString('en-GB',{hour12:false})});
          addLog('['+exit.reason+'] '+pos.symbol+' | '+pnlFmt(profit),profit>=0?'profit':'loss');
        }else active.push({...pos,currentPrice:newPrice,hwm:exit.hwm,stopLoss:exit.newSL});
      });
      return{...prev,cash,positions:active,history:newHist.length?[...newHist,...prev.history]:prev.history};
    });
  },[addLog]);

  // -- Demo Mode ---------------------------------------------------------------
  const startDemo=useCallback(async(mode)=>{
    setDemoState('loading');setDemoMode(mode);setDemoProgress(0);demoIdxRef.current=0;
    // Reset to simulated portfolio for demo
    setPortfolio({cash:INITIAL_EQUITY,equity:INITIAL_EQUITY,buying_power:INITIAL_EQUITY,positions:[],history:[],loaded:true});
    addLog('[DEMO] Loading intraday data for all 20 symbols...','info');
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    while(yesterday.getDay()===0||yesterday.getDay()===6)yesterday.setDate(yesterday.getDate()-1);
    const ys=yesterday.toISOString().split('T')[0];
    const allData={};
    const marketBias=(Math.random()-0.42)*0.0005;
    addLog('[DEMO] Market bias: '+(marketBias>0?'BULL':'BEAR')+' ('+((marketBias*10000).toFixed(1))+' bps/min)','info');
    await Promise.allSettled(SEEDS.map(async seed=>{
      let realBars=[];
      try{const r=await fetch(api('/api/bars/'+seed.symbol+'?timeframe=1Min&limit=390&start='+ys+'T13:30:00Z&end='+ys+'T20:00:00Z'));
        const d=await r.json();if(d.bars&&d.bars.length>5)realBars=d.bars;}catch(e){}
      allData[seed.symbol]=generateSymbolDay(seed,realBars,marketBias);
    }));
    demoAllDataRef.current=allData;
    setDemoData(allData[SEEDS[0].symbol]||[]);
    setDemoSym(SEEDS[0].symbol);
    setDemoState('running');
    setDataMode('demo');
    addLog('[DEMO] Running --- auto-trading all 20 symbols in simulation','trade');
  },[addLog]);

  const stopDemo=useCallback(()=>{
    setDemoState('idle');setDemoProgress(0);demoIdxRef.current=0;
    demoAllDataRef.current={};setDataMode('idle');
    addLog('[DEMO] Stopped','info');
  },[addLog]);

  // Demo tick loop --- feeds all 20 symbols simultaneously
  useEffect(()=>{
    if(demoState!=='running')return;
    const interval=demoMode==='fast'?55:380;
    const maxLen=Math.max(...SEEDS.map(s=>(demoAllDataRef.current[s.symbol]||[]).length),390);
    const id=setInterval(()=>{
      const idx=demoIdxRef.current;
      if(idx>=maxLen){setDemoState('done');setDataMode('idle');addLog('[DEMO] Day complete','trade');clearInterval(id);return;}
      SEEDS.forEach(seed=>{const bars=demoAllDataRef.current[seed.symbol]||[];if(idx<bars.length)processTick(seed.symbol,bars[idx].c);});
      setDemoProgress(Math.round((idx/maxLen)*100));
      demoIdxRef.current=idx+1;
    },interval);
    return()=>clearInterval(id);
  },[demoState,demoMode,processTick,addLog]);

  // -- Auto-entry engine --------------------------------------------------------
  // DEMO:  client-side portfolio mutation (unchanged from v6)
  // LIVE:  submits real bracket orders via POST /api/trade
  const autoEnterTrades=useCallback(async(minStr,isDemo)=>{
    const c=cfgRef.current,port=portfolioRef.current;
    const openSlots=c.maxPositions-port.positions.length;
    if(openSlots<=0)return;
    // Block symbols already held or with a pending order in flight
    const held=new Set(port.positions.map(p=>p.symbol));
    if(!isDemo)pendingOrders.current.forEach(s=>held.add(s));
    const now=Date.now();
    const candidates=stocksRef.current
      .filter(s=>s.signal==='BUY'&&s.signalStrength>=minStr&&!held.has(s.symbol)&&
        s.price>0&&s.atr>0&&(!cooldowns.current[s.symbol]||now-cooldowns.current[s.symbol]>c.cooldownSec*1000))
      .sort((a,b)=>b.signalStrength-a.signalStrength).slice(0,openSlots);
    if(!candidates.length)return;

    if(isDemo){
      // -- DEMO: full local simulation (unchanged) --------------------------
      const newPositions=[];let cashLeft=port.cash;
      for(const best of candidates){
        const posAmt=manualAmtRef.current||2000;
        const equity=port.cash+port.positions.reduce((a,p)=>a+p.shares*p.currentPrice,0);
        const tradeVal=f2(Math.min(posAmt,equity*0.20,cashLeft*0.92));
        if(tradeVal<50)continue;
        const shares=f4(tradeVal/best.price);if(shares<=0)continue;
        const atr=best.atr||f2(best.price*(best.vol||0.02));
        const slMult={PULLBACK:1.5,BREAKOUT:1.2,BOUNCE:2.0,CROSS:1.4,SCALP:1.0}[best.entryType]||1.5;
        const tpMult={PULLBACK:3.5,BREAKOUT:5.0,BOUNCE:3.0,CROSS:3.5,SCALP:2.0}[best.entryType]||3.0;
        const sl=f2(best.price-atr*slMult),tp=f2(best.price+atr*tpMult);
        const rr=+((tp-best.price)/(best.price-sl)).toFixed(2);
        cashLeft=f2(cashLeft-tradeVal);
        newPositions.push({id:Math.random().toString(36).slice(2,9),symbol:best.symbol,shares,
          entryPrice:best.price,currentPrice:best.price,stopLoss:sl,takeProfit:tp,hwm:best.price,
          trailMult:c.trailMult,riskReward:rr,atr,strength:best.signalStrength,entryType:best.entryType,
          enteredAt:now,t:new Date().toLocaleTimeString('en-GB',{hour12:false}),isAuto:true,isDemo:true});
        addLog('[DEMO.'+(best.entryType||'BUY')+'] '+best.symbol+' x'+shares.toFixed(3)+
          ' @ '+usd(best.price)+' = '+usd(tradeVal)+' | SL:'+usd(sl)+' TP:'+usd(tp),'trade');
      }
      if(newPositions.length>0)
        setPortfolio(prev=>({...prev,cash:cashLeft,positions:[...prev.positions,...newPositions]}));

    } else {
      // -- LIVE: fetch real ATR, then submit bracket orders to Alpaca -------
      // Mark all candidates pending BEFORE any async ops so the next 1-second
      // interval tick cannot re-enter the same symbols while we await ATR.
      candidates.forEach(best=>{
        pendingOrders.current.add(best.symbol);
        cooldowns.current[best.symbol]=now;
      });
      // Fetch real ATR(14) for all candidates in parallel.
      // Server caches results 60 s, so this won't flood the data API.
      const atrResults=await Promise.allSettled(
        candidates.map(best=>fetch(api('/api/atr/'+best.symbol)).then(r=>r.json()))
      );
      const bp=port.buying_power||port.cash;
      for(let i=0;i<candidates.length;i++){
        const best=candidates[i];
        const posAmt=manualAmtRef.current||2000;
        const tradeVal=Math.min(posAmt,bp*0.20);
        const qtyInt=Math.max(1,Math.floor(tradeVal/best.price));
        // Use real server-computed ATR; fall back to signal approximation if fetch failed
        const atrData=atrResults[i].status==='fulfilled'?atrResults[i].value:{};
        const atr=atrData.atr||best.atr||f2(best.price*(best.vol||0.02));
        const atrSrc=atrData.atr?'real':'est';
        const slMult={PULLBACK:1.5,BREAKOUT:1.2,BOUNCE:2.0,CROSS:1.4,SCALP:1.0}[best.entryType]||1.5;
        const tpMult={PULLBACK:3.5,BREAKOUT:5.0,BOUNCE:3.0,CROSS:3.5,SCALP:2.0}[best.entryType]||3.0;
        const sl=f2(best.price-atr*slMult),tp=f2(best.price+atr*tpMult);
        fetch(api('/api/trade'),{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({symbol:best.symbol,qty:qtyInt,stopLoss:sl,takeProfit:tp,price:best.price,isAuto:true})
        }).then(r=>r.json()).then(data=>{
          if(data.error){
            addLog('[AUTO REJECTED] '+best.symbol+': '+data.error,'warn');
            pendingOrders.current.delete(best.symbol);
          }else{
            addLog('[AUTO.'+(best.entryType||'BUY')+'] '+best.symbol+' x'+qtyInt+
              ' @ ~'+usd(best.price)+' | SL:'+usd(sl)+' TP:'+usd(tp)+' ATR:'+usd(atr)+'('+atrSrc+')','trade');
          }
        }).catch(e=>{
          addLog('[AUTO ERROR] '+best.symbol+': '+e.message,'warn');
          pendingOrders.current.delete(best.symbol);
        });
      }
    }
  },[addLog]);

  // Live auto-engine (fires on a 1s interval when engine is armed)
  useEffect(()=>{
    if(dataMode==='idle'||dataMode==='connecting'||dataMode==='demo')return;
    const id=setInterval(()=>{if(!autoOnRef.current)return;autoEnterTrades(cfgRef.current.minStrength,false);},1000);
    return()=>clearInterval(id);
  },[dataMode,autoEnterTrades]);

  // Demo auto-engine
  useEffect(()=>{
    if(demoState!=='running')return;
    const id=setInterval(()=>{if(!demoAutoRef.current)return;autoEnterTrades(Math.max(30,cfgRef.current.minStrength-15),true);},1200);
    return()=>clearInterval(id);
  },[demoState,autoEnterTrades]);

  // Sim mode (no backend) --- random price walk, no real orders
  useEffect(()=>{
    if(dataMode!=='sim')return;
    let idx=0;
    const id=setInterval(()=>{const s=stocksRef.current[idx%stocksRef.current.length];idx++;
      processTick(s.symbol,Math.max(0.01,f2(s.price*(1+0.0001+s.vol*0.20*(Math.random()*2-1)))));},400);
    return()=>clearInterval(id);
  },[dataMode,processTick]);

  // -- Manual trade --- submits real bracket order to Alpaca ---------------------
  const manualTrade=useCallback(async(s)=>{
    const lotSize=manualAmtRef.current||2000;
    const port=portfolioRef.current;
    const bp=port.buying_power||port.cash;
    if(bp<100){addLog('[SKIP] Insufficient buying power ('+usd(bp)+')','warn');return;}
    const posSize=Math.min(lotSize,bp*0.95);
    const qtyInt=Math.max(1,Math.floor(posSize/s.price));
    const actualCost=f2(qtyInt*s.price);
    // Fetch real ATR(14) from server before computing SL/TP.
    // Server caches per-symbol for 60s so this is nearly instant on repeat clicks.
    let atr=s.atr||f2(s.price*(s.vol||0.02));
    let atrSrc='est';
    try{
      const atrResp=await fetch(api('/api/atr/'+s.symbol));
      if(atrResp.ok){const atrData=await atrResp.json();if(atrData.atr){atr=atrData.atr;atrSrc='real';}}
    }catch(e){/* fall back to signal approximation */}
    const slMult={PULLBACK:1.5,BREAKOUT:1.2,BOUNCE:1.8,CROSS:1.4,SCALP:1.0}[s.entryType]||1.5;
    const tpMult={PULLBACK:3.0,BREAKOUT:4.0,BOUNCE:2.5,CROSS:3.0,SCALP:2.0}[s.entryType]||3.0;
    const sl=f2(s.price-atr*slMult),tp=f2(s.price+atr*tpMult);
    addLog('[SUBMITTING] '+s.symbol+' x'+qtyInt+' @ ~'+usd(s.price)+' = '+usd(actualCost)+
      ' | SL:'+usd(sl)+' TP:'+usd(tp)+' ATR:'+usd(atr)+'('+atrSrc+')','trade');
    try{
      const resp=await fetch(api('/api/trade'),{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({symbol:s.symbol,qty:qtyInt,stopLoss:sl,takeProfit:tp,price:s.price,isAuto:false})});
      const data=await resp.json();
      if(!resp.ok||data.error){
        addLog('[REJECTED] '+s.symbol+': '+(data.error||'Alpaca refused order'),'warn');
        return;
      }
      addLog('[ORDER SENT] '+s.symbol+' #'+(data.order_id||'').slice(0,8)+' --- waiting for fill...','trade');
      pendingOrders.current.add(s.symbol);
      setSelectedSym(s.symbol);
    }catch(e){
      addLog('[ERROR] Network: '+e.message,'warn');
    }
  },[addLog]);

  // -- Close position -------------------------------------------------------
  // DEMO:  remove from local state immediately (no backend position exists)
  // LIVE:  POST /api/close-position with symbol in body.
  //        Using POST+body instead of DELETE /:symbol eliminates any Express
  //        route-param ambiguity and works for any symbol format.
  const closePosition=useCallback(async(symbol)=>{
    console.log('[DEBUG] closePosition called, symbol=',symbol,'mode=',dataModeRef.current);
    const isDemo=dataModeRef.current==='demo';
    addLog('[CLOSE] Button pressed for '+symbol+' (mode: '+dataModeRef.current+')','info');
    if(isDemo){
      setPortfolio(prev=>{
        const pos=prev.positions.find(p=>p.symbol===symbol);
        if(!pos)return prev;
        const exitPx=pos.currentPrice||pos.entryPrice;
        const profit=f2((exitPx-pos.entryPrice)*pos.shares);
        const histEntry={
          symbol,type:'MANUAL_EXIT',entry:pos.entryPrice,exit:exitPx,profit,
          rr:pos.riskReward||null,held:Math.round((Date.now()-pos.enteredAt)/1000)+'s',
          strategy:pos.entryType||null,ts:Date.now(),
          t:new Date().toLocaleTimeString('en-GB',{hour12:false})
        };
        addLog('[DEMO CLOSE] '+symbol+' | '+pnlFmt(profit),profit>=0?'profit':'loss');
        return{...prev,cash:f2(prev.cash+exitPx*pos.shares),
          positions:prev.positions.filter(p=>p.symbol!==symbol),
          history:[histEntry,...prev.history]};
      });
      return;
    }
    // LIVE / SIM mode - hit real backend
    addLog('[CLOSING] '+symbol+' --- submitting market sell...','trade');
    try{
      const resp=await fetch(api('/api/close-position'),{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({symbol})
      });
      const data=await resp.json();
      if(!resp.ok||data.error){
        addLog('[CLOSE ERROR] '+symbol+': '+(data.error||'HTTP '+resp.status),'warn');
        return;
      }
      addLog('[CLOSE ORDER SENT] '+symbol+' #'+(data.order_id||'').slice(0,8)+' --- waiting for fill...','trade');
    }catch(e){addLog('[CLOSE ERROR] Network: '+e.message,'warn');}
  },[addLog]);

  // -- WebSocket: live price stream + trade update stream -----------------------
  const connectLive=useCallback(()=>{
    setDataMode('connecting');addLog('[STREAM] Connecting to server...');
    let timer=setTimeout(()=>{addLog('[STREAM] Backend not reachable --- simulation mode','warn');setDataMode('sim');wsRef.current?.close();},WS_TIMEOUT);
    const ws=new WebSocket(wsUrl());wsRef.current=ws;

    ws.onmessage=evt=>{
      let msg;try{msg=JSON.parse(evt.data);}catch{return;}

      // -- Initial connection -----------------------------------------------
      if(msg.type==='connected'){
        clearTimeout(timer);setDataMode('live');
        addLog('[LIVE] Connected'+(msg.paper?' (PAPER TRADING)':'')+
          (msg.alpacaReady?' | Market data: ready':' | Market data: connecting...'),'trade');
        // Load real account state from Alpaca immediately
        refreshAccount();
      }
      if(msg.type==='alpaca_connected')addLog('[DATA] '+msg.symbols?.length+' symbols subscribed','trade');
      if(msg.type==='trade_stream_ready')addLog('[TRADE STREAM] Order updates: active','trade');
      if(msg.type==='trade_stream_error')addLog('[TRADE STREAM] Warning: '+(msg.reason||'unknown'),'warn');

      // -- Real-time price tick ---------------------------------------------
      if(msg.type==='tick'&&msg.symbol&&msg.price)processTick(msg.symbol,msg.price);

      // -- Trade update from Alpaca -----------------------------------------
      // This fires when: bracket order fills (entry), stop-loss triggers,
      // take-profit triggers, manual close fills, or order gets rejected.
      if(msg.type==='trade_update'){
        const{event,symbol,side,filled_avg_price,filled_qty,status,reject_reason,
              sl,tp,isAuto,entry_price,entered_at,order_type}=msg;

        // Entry fill --- a new position has opened on Alpaca
        if(event==='fill'&&side==='buy'){
          pendingOrders.current.delete(symbol);
          setPortfolio(prev=>{
            // Guard against duplicate fill events
            if(prev.positions.some(p=>p.symbol===symbol))return prev;
            const newPos=normalizePosition({
              id:msg.order_id,symbol,qty:filled_qty,
              avg_entry_price:filled_avg_price,current_price:livePrices.current[symbol]||filled_avg_price,
              sl,tp,isAuto,entered_at
            });
            addLog('[FILL] '+symbol+' x'+filled_qty+' entered @ '+usd(filled_avg_price),'trade');
            return{...prev,positions:[...prev.positions,newPos]};
          });
          // Refresh balance after a small delay (Alpaca updates equity ~1s after fill)
          setTimeout(refreshAccount,1500);
        }

        // Exit fill --- position closed by SL, TP, or manual sell
        if(event==='fill'&&side==='sell'){
          pendingOrders.current.delete(symbol);
          setPortfolio(prev=>{
            const pos=prev.positions.find(p=>p.symbol===symbol);
            const entryPx=entry_price||pos?.entryPrice||filled_avg_price;
            const qty=filled_qty||(pos?.shares||0);
            const profit=f2((filled_avg_price-entryPx)*qty);
            const heldMs=pos?(Date.now()-pos.enteredAt):0;
            const exitType=deriveExitType(msg);
            const histEntry={
              symbol,type:exitType,entry:entryPx,exit:filled_avg_price,profit,
              rr:pos?.riskReward||null,
              held:Math.round(heldMs/1000)+'s',
              strategy:pos?.entryType||null,
              ts:Date.now(),
              t:new Date().toLocaleTimeString('en-GB',{hour12:false})
            };
            addLog('['+exitType+'] '+symbol+' | '+pnlFmt(profit),profit>=0?'profit':'loss');
            return{
              ...prev,
              positions:prev.positions.filter(p=>p.symbol!==symbol),
              history:[histEntry,...prev.history]
            };
          });
          setTimeout(refreshAccount,1500);
        }

        // Partial fill --- update shares count
        if(event==='partial_fill'&&side==='buy'){
          addLog('[PARTIAL FILL] '+symbol+' '+filled_qty+'/'+msg.qty+' shares','trade');
        }

        // Order rejected or canceled by Alpaca
        if(event==='canceled'||status==='rejected'){
          pendingOrders.current.delete(symbol);
          const reason=reject_reason||status||'unknown';
          addLog('[ORDER REJECTED] '+symbol+': '+reason,'warn');
        }
        if(event==='rejected'){
          pendingOrders.current.delete(symbol);
          addLog('[REJECTED] '+symbol+': '+(reject_reason||'Alpaca refused'),'warn');
        }
        // Order accepted/acknowledged
        if(event==='new'){
          addLog('[ORDER ACCEPTED] '+symbol+' bracket order queued','trade');
        }
      }
    };
    ws.onerror=()=>{clearTimeout(timer);addLog('[ERR] Connection failed --- simulation mode','warn');setDataMode('sim');};
    ws.onclose=()=>clearTimeout(timer);
  },[addLog,processTick,refreshAccount]);

  // -- Derived values ----------------------------------------------------------
  const isDemoMode=demoState==='running'||demoState==='paused'||demoState==='loading';
  // In live mode: equity from Alpaca.  In demo/sim: compute locally.
  const posVal=portfolio.positions.reduce((a,p)=>a+p.shares*(p.currentPrice||p.entryPrice),0);
  const equity=portfolio.equity||(portfolio.cash+posVal)||0;
  const totalRet=pctOf(equity,INITIAL_EQUITY);
  const openPnl=portfolio.positions.reduce((a,p)=>a+(p.currentPrice-p.entryPrice)*p.shares,0);
  // In backtest mode: use bt results for all analytics. In live/demo: use portfolio history.
  const closed = btMode==='backtest' ? btTrades : portfolio.history;
  const realPnl=closed.reduce((a,t)=>a+t.profit,0);
  const wins=closed.filter(t=>t.profit>0).length;
  const winRate=closed.length?Math.round(wins/closed.length*100):null;
  const buys=stocks.filter(s=>s.signal==='BUY');
  const isActive=dataMode==='live'||dataMode==='sim';
  const modeColor=dataMode==='live'?'#22c55e':dataMode==='sim'?'#f59e0b':dataMode==='demo'?'#a78bfa':dataMode==='connecting'?'#60a5fa':'#334155';
  const riskAlerts=getRiskAlerts(portfolio,cfg,equity);
  const visSt=sigFilter==='ALL'?stocks:stocks.filter(s=>s.signal===sigFilter);
  const mktCol=mktStatus.isOpen?'#22c55e':mktStatus.isPre||mktStatus.isAH?'#fbbf24':'#ef4444';
  const buyingPower=portfolio.buying_power||portfolio.cash;

  const th={padding:'8px 10px',textAlign:'left',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',color:'#475569',fontWeight:700,borderBottom:'1px solid #0d0d14',whiteSpace:'nowrap'};
  const td={padding:'10px 10px',borderBottom:'1px solid #0a0a12',color:'#e2e8f0',fontSize:13};

  // -- Analytics (all calculations) -------------------------------------------
  const trades=closed;
  const wns=trades.filter(t=>t.profit>0);
  const lss=trades.filter(t=>t.profit<=0);

  // Basic aggregates
  const avgWin =wns.length?f2(wns.reduce((a,t)=>a+t.profit,0)/wns.length):0;
  const avgLoss=lss.length?f2(lss.reduce((a,t)=>a+t.profit,0)/lss.length):0;
  const bestTrade =trades.length?Math.max(...trades.map(t=>t.profit)):0;
  const worstTrade=trades.length?Math.min(...trades.map(t=>t.profit)):0;

  // 1. REAL PROFIT FACTOR = total gross profit / |total gross loss|
  const grossWin =wns.reduce((a,t)=>a+t.profit,0);
  const grossLoss=Math.abs(lss.reduce((a,t)=>a+t.profit,0));
  const profitFactor=grossLoss>0?+(grossWin/grossLoss).toFixed(2):grossWin>0?Infinity:0;

  // 2. TRUE MAX DRAWDOWN
  // Walk equity chronologically (history is newest-first, so reverse).
  // Track the running peak; deepest trough from any peak is the max drawdown.
  const maxDrawdown=useMemo(()=>{
    if(!trades.length)return 0;
    const chrono=[...trades].reverse();
    let eq=INITIAL_EQUITY,peak=INITIAL_EQUITY,worst=0;
    chrono.forEach(t=>{
      eq=f2(eq+t.profit);
      if(eq>peak)peak=eq;
      const dd=peak>0?(peak-eq)/peak*100:0;
      if(dd>worst)worst=dd;
    });
    return +worst.toFixed(2);
  },[trades]);

  // 3. STRATEGY BREAKDOWN

  const stratStats=useMemo(()=>{
    const map={};
    trades.forEach(t=>{
      const k=t.strategy||'OTHER';
      if(!map[k])map[k]={n:0,wins:0,pnl:0};
      map[k].n++;
      if(t.profit>0)map[k].wins++;
      map[k].pnl=f2(map[k].pnl+t.profit);
    });
    // Order: known strategies first, then OTHER
    return [...STRATEGIES,'OTHER']
      .filter(k=>map[k])
      .map(k=>({strategy:k,...map[k],wr:map[k].n?Math.round(map[k].wins/map[k].n*100):0}));
  },[trades]);

  // 252 is standard trading days; appropriate since each "period" is one trade.
  const sharpe=useMemo(()=>{
    if(trades.length<2)return null;
    const rets=trades.map(t=>t.entry>0?(t.exit-t.entry)/t.entry:0);
    const mean=rets.reduce((a,r)=>a+r,0)/rets.length;
    const variance=rets.reduce((a,r)=>a+(r-mean)**2,0)/(rets.length-1);
    const std=Math.sqrt(variance);
    if(std===0)return null;
    return +(mean/std*Math.sqrt(252)).toFixed(2);

      <div style={{overflowY:'auto',flex:1,padding:'6px 12px'}}>
        {trades.length===0?(
          <div style={{textAlign:'center',padding:'24px 0',color:'#334155',fontSize:11,lineHeight:'1.6'}}>
            {btMode==='backtest'
              ? 'Configure parameters above and press RUN to backtest the last N days of data.'
              : 'No closed trades yet.\nRun a demo or go live to populate stats.'}
          </div>
        ):(
          <>
            {sectionHead('Performance')}
            {stat('Total Trades', trades.length)}
            {stat('Win Rate', (winRate??0)+'%  ('+wns.length+'W / '+lss.length+'L)', (winRate??0)>=50?'#22c55e':'#ef4444')}
            {stat('Total P&L', pnlFmt(realPnl), realPnl>=0?'#22c55e':'#ef4444')}
            {stat('Avg Win', pnlFmt(avgWin), '#22c55e')}
            {stat('Avg Loss', pnlFmt(avgLoss), '#ef4444')}
            {stat('Best Trade', pnlFmt(bestTrade), '#22c55e')}
            {stat('Worst Trade', pnlFmt(worstTrade), '#ef4444')}

            {sectionHead('Risk Metrics')}
            {stat('Profit Factor',
              profitFactor===Infinity?'Inf (no losses)':profitFactor.toFixed(2),
              profitFactor===Infinity||profitFactor>=1.5?'#22c55e':profitFactor>=1?'#fbbf24':'#ef4444'
            )}
            {stat('Max Drawdown',
              '-'+maxDrawdown.toFixed(2)+'%',
              maxDrawdown<5?'#22c55e':maxDrawdown<15?'#fbbf24':'#ef4444'
            )}
            {stat('Sharpe Ratio (ann.)',
              sharpe===null?'--':sharpe>=0?'+'+sharpe:String(sharpe),
              sharpe===null?'#475569':sharpe>=1?'#22c55e':sharpe>=0?'#fbbf24':'#ef4444'
            )}
            {stat('Return vs Start',
              (totalRet>=0?'+':'')+totalRet.toFixed(2)+'%',
              totalRet>=0?'#22c55e':totalRet>-5?'#fbbf24':'#ef4444'
            )}

            {stratStats.length>0&&(
              <>
                {sectionHead('Strategy Breakdown')}
                <div style={{width:'100%',borderCollapse:'collapse',display:'table',marginBottom:4}}>
                  <div style={{display:'table-header-group'}}>
                    <div style={{display:'table-row'}}>
                      {['Strategy','Trades','Win%','P&L'].map(h=>(
                        <div key={h} style={{display:'table-cell',fontSize:8,color:'#334155',fontWeight:700,textTransform:'uppercase',paddingBottom:4,letterSpacing:'0.06em',borderBottom:'1px solid #0f0f18'}}>{h}</div>
                      ))}
                    </div>
                  </div>
                  <div style={{display:'table-row-group'}}>
                    {stratStats.map(s=>{
                      const pnlC=s.pnl>=0?'#22c55e':'#ef4444';
                      const wrC=s.wr>=55?'#22c55e':s.wr>=45?'#fbbf24':'#ef4444';
                      return(
                        <div key={s.strategy} style={{display:'table-row'}}>
                          <div style={{display:'table-cell',padding:'5px 0',borderBottom:'1px solid #0a0a10',fontSize:10,fontWeight:700,color:'#a78bfa',verticalAlign:'middle'}}>{s.strategy}</div>
                          <div style={{display:'table-cell',padding:'5px 0',borderBottom:'1px solid #0a0a10',fontSize:10,color:'#94a3b8',verticalAlign:'middle'}}>{s.n}</div>
                          <div style={{display:'table-cell',padding:'5px 4px',borderBottom:'1px solid #0a0a10',verticalAlign:'middle'}}>
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                              <div style={{width:28,height:4,background:'#0f0f14',borderRadius:2,overflow:'hidden',flexShrink:0}}>
                                <div style={{height:'100%',width:s.wr+'%',background:wrC,borderRadius:2}}/>
                              </div>
                              <span style={{fontSize:10,fontWeight:700,color:wrC}}>{s.wr}%</span>
                            </div>
                          </div>
                          <div style={{display:'table-cell',padding:'5px 0',borderBottom:'1px solid #0a0a10',fontSize:10,fontWeight:700,color:pnlC,verticalAlign:'middle',textAlign:'right'}}>{pnlFmt(s.pnl)}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </>
            )}

            {sectionHead('Exit Reasons')}
            {Object.entries(byReason)
              .sort((a,b)=>b[1]-a[1])
              .map(([k,v])=>{
                const isWin=k==='TAKE_PROFIT';
                const isStop=k.includes('STOP')||k==='STOP_LOSS';
                const barC=isWin?'#22c55e':isStop?'#ef4444':'#475569';
                return(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid #0a0a10'}}>
                    <span style={{fontSize:10,color:isWin?'#22c55e':isStop?'#ef4444':'#475569',fontWeight:600}}>{k.replace(/_/g,' ')}</span>
                    <div style={{display:'flex',alignItems:'center',gap:5}}>
                      <div style={{width:44,height:3,background:'#0f0f14',borderRadius:2,overflow:'hidden'}}>
                        <div style={{height:'100%',width:Math.round((v/trades.length)*100)+'%',background:barC,borderRadius:2}}/>
                      </div>
                      <span style={{fontSize:10,color:'#64748b',minWidth:16,textAlign:'right'}}>{v}</span>
                    </div>
                  </div>
                );
              })
            }
          </>
        )}
      </div>
    </div>
  );

  const logPanel=(
    <div style={{overflowY:'auto',height:'100%'}}>
      {closed.length===0?(
        <div style={{height:100,display:'flex',alignItems:'center',justifyContent:'center',color:'#334155',fontSize:8,textTransform:'uppercase'}}>No closed trades yet</div>
      ):(
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>{['Time','Sym','Reason','Entry','Exit','P&L','Held'].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
          <tbody>
            {closed.map((t,i)=>(
              <tr key={i}>
                <td style={{...td,color:'#334155',fontSize:8}}>{t.t}</td>
                <td style={{...td,fontWeight:700,color:'#22d3ee'}}>{t.symbol}</td>
                <td style={td}><span style={{fontSize:7,padding:'1px 4px',border:'1px solid '+(t.type==='TAKE_PROFIT'?'#16a34a':t.type.includes('STOP')?'#991b1b':'#334155'),color:t.type==='TAKE_PROFIT'?'#22c55e':t.type.includes('STOP')?'#ef4444':'#94a3b8'}}>{t.type.replace(/_/g,' ')}</span></td>
                <td style={{...td,color:'#64748b'}}>{usd(t.entry)}</td>
                <td style={{...td,color:'#94a3b8'}}>{usd(t.exit)}</td>
                <td style={{...td,fontWeight:700,color:t.profit>=0?'#22c55e':'#ef4444'}}>{pnlFmt(t.profit)}</td>
                <td style={{...td,color:'#475569',fontSize:8}}>{t.held}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );

  // -- Right panel: engine controls + live positions + log ---------------------
  const rightPanel=(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflowY:'auto'}}>

      {/* AUTO-EXECUTE */}
      <div style={{padding:'14px 14px',borderBottom:'1px solid #0f0f18',background:autoOn?'#07110a':'#07070c',flexShrink:0}}>
        <div style={{fontSize:11,color:autoOn?'#4ade80':'#64748b',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>
          {autoOn?'Engine running --- orders sent to Alpaca Paper':'Engine off --- manual approval only'}
        </div>
        <button
          onClick={()=>setAutoOn(p=>{const n=!p;addLog(n?'[ENGINE] Auto-Execute ON':'[ENGINE] Auto-Execute OFF',n?'trade':'info');return n;})}
          style={{width:'100%',padding:'14px 0',fontSize:16,fontWeight:800,
            border:'2px solid '+(autoOn?'#22c55e':'#334155'),
            color:autoOn?'#fff':'#94a3b8',
            background:autoOn?'linear-gradient(135deg,#14532d,#166534)':'#0d0d14',
            borderRadius:6,cursor:'pointer',letterSpacing:'0.04em',
            boxShadow:autoOn?'0 0 20px #22c55e44':'none',transition:'all 0.2s'}}>
          {autoOn?'AUTO-EXECUTE: ON  --  Click to Pause':'AUTO-EXECUTE: OFF  --  Click to Activate'}
        </button>
        {autoOn&&(
          <div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
            <div style={{flex:1,background:'#0a1a0a',padding:'6px 10px',borderRadius:4,border:'1px solid #16a34a22'}}>
              <div style={{fontSize:9,color:'#475569',textTransform:'uppercase'}}>Open slots</div>
              <div style={{fontSize:16,fontWeight:700,color:'#22c55e'}}>{cfg.maxPositions-portfolio.positions.length}</div>
            </div>
            <div style={{flex:1,background:'#0a1a0a',padding:'6px 10px',borderRadius:4,border:'1px solid #16a34a22'}}>
              <div style={{fontSize:9,color:'#475569',textTransform:'uppercase'}}>Signals</div>
              <div style={{fontSize:16,fontWeight:700,color:'#22c55e'}}>{buys.length}</div>
            </div>
            <div style={{flex:1,background:'#0a1a0a',padding:'6px 10px',borderRadius:4,border:'1px solid #16a34a22'}}>
              <div style={{fontSize:9,color:'#475569',textTransform:'uppercase'}}>In trades</div>
              <div style={{fontSize:16,fontWeight:700,color:'#a78bfa'}}>{portfolio.positions.length}</div>
            </div>
          </div>
        )}
        {/* Pending orders indicator */}
        {pendingOrders.current.size>0&&(
          <div style={{marginTop:6,fontSize:10,color:'#fbbf24',fontStyle:'italic'}} className="pulse">
            {pendingOrders.current.size} order{pendingOrders.current.size>1?'s':''} pending fill...
          </div>
        )}
      </div>

      {/* Live Positions (right panel mini-view) */}
      <div style={{flexShrink:0,borderBottom:'1px solid #0f0f18'}}>
        <div style={{padding:'8px 14px',fontSize:11,fontWeight:700,color:'#a78bfa',textTransform:'uppercase',letterSpacing:'0.08em',background:'#08080f',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>Open Positions</span>
          <span style={{color:openPnl>=0?'#22c55e':'#ef4444',fontWeight:700}}>{pnlFmt(openPnl)}</span>
        </div>
        {portfolio.positions.length===0?(
          <div style={{padding:'16px',textAlign:'center',color:'#1e293b',fontSize:12}}>{autoOn?'Scanning for entries...':'Activate engine or buy manually'}</div>
        ):(
          <div style={{maxHeight:200,overflowY:'auto'}}>
            {portfolio.positions.map(pos=>{
              const pl=(pos.currentPrice-pos.entryPrice)*pos.shares;
              const heldS=Math.round((Date.now()-pos.enteredAt)/1000);
              const seed=SEEDS.find(s=>s.symbol===pos.symbol);
              return(
                <div key={pos.id} style={{padding:'10px 14px',borderBottom:'1px solid #0a0a12',cursor:'pointer',background:pl>=0?'#060e06':'#0e0606'}}
                  onClick={()=>setSelectedSym(pos.symbol)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <span style={{fontWeight:800,fontSize:14,color:TIER_COLOR[seed?.tier]||'#22d3ee'}}>{pos.isAuto&&<span style={{color:'#a78bfa',marginRight:3}}>*</span>}{pos.symbol}</span>
                    <span style={{fontWeight:700,fontSize:14,color:pl>=0?'#22c55e':'#ef4444'}}>{pnlFmt(pl)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#475569',marginBottom:6}}>
                    <span>Entry {usd(pos.entryPrice)}</span>
                    <span>Now {usd(pos.currentPrice)}</span>
                    <span style={{color:'#334155'}}>{heldS}s</span>
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{fontSize:10,color:'#ef4444'}}>SL {pos.stopLoss?usd(pos.stopLoss):'--'}</span>
                    <span style={{fontSize:10,color:'#22c55e'}}>TP {pos.takeProfit?usd(pos.takeProfit):'--'}</span>
                    <button onClick={e=>{e.stopPropagation();console.log('Button DOM clicked',pos.symbol);closePosition(pos.symbol);}} style={{marginLeft:'auto',padding:'5px 12px',fontSize:11,fontWeight:700,border:'1px solid #991b1b',color:'#ef4444',background:'#110000',cursor:'pointer',borderRadius:3,position:'relative',zIndex:50}}>Close</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Trade Settings */}
      <div style={{padding:'12px 14px',borderBottom:'1px solid #0f0f18',flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#475569',marginBottom:10}}>Trade Settings</div>
        <div style={{marginBottom:12,background:'#0a0a14',padding:'10px 12px',borderRadius:5,border:'1px solid #1e293b'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:12,color:'#94a3b8',fontWeight:600}}>Position Size ($ per trade)</span>
            <span style={{fontSize:14,fontWeight:800,color:'#fbbf24'}}>${manualAmt.toLocaleString()}</span>
          </div>
          <input type="range" min={500} max={20000} step={500} value={manualAmt}
            onChange={e=>setManualAmt(Number(e.target.value))}
            style={{width:'100%',height:6,accentColor:'#fbbf24',marginBottom:4}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#334155'}}>
            <span>$500</span>
            <span style={{color:'#64748b'}}>auto + manual</span>
            <span>$20k</span>
          </div>
        </div>
        {[
          {k:'maxPositions',l:'Max simultaneous positions',min:1,max:12,step:1,sfx:''},
          {k:'minStrength',l:'Min signal strength to enter',min:25,max:90,step:5,sfx:'%'},
          {k:'cooldownSec',l:'Cooldown per symbol',min:5,max:300,step:5,sfx:'s'},
          {k:'maxHoldSec',l:'Force-close after (demo only)',min:30,max:1800,step:30,sfx:'s'},
          {k:'trailMult',l:'Trail stop (demo only, x ATR)',min:0.3,max:3,step:0.1,sfx:'x'},
        ].map(({k,l,min,max,step,sfx})=>(
          <div key={k} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
              <span style={{color:'#64748b'}}>{l}</span>
              <span style={{fontWeight:700,color:'#e2e8f0'}}>{cfg[k]}{sfx}</span>
            </div>
            <input type="range" min={min} max={max} step={step} value={cfg[k]}
              onChange={e=>setCfg(p=>({...p,[k]:Number(e.target.value)}))}
              style={{width:'100%',height:4,accentColor:'#a78bfa'}}/>
          </div>
        ))}
      </div>

      {/* System Log */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
        <div style={{padding:'6px 14px',fontSize:10,fontWeight:700,color:'#334155',textTransform:'uppercase',letterSpacing:'0.08em',borderBottom:'1px solid #0f0f18',background:'#08080f',flexShrink:0}}>Activity Log</div>
        <div style={{overflowY:'auto',flex:1,padding:'4px 10px',display:'flex',flexDirection:'column',gap:2}}>
          {sysLog.length===0&&<div style={{color:'#1e293b',fontSize:11,padding:8,textAlign:'center'}}>Awaiting activity...</div>}
          {sysLog.map((e,i)=>(
            <div key={i} style={{display:'flex',gap:6,fontSize:11,lineHeight:1.6,padding:'1px 0'}}>
              <span style={{color:'#334155',flexShrink:0,fontSize:10}}>{e.t}</span>
              <span style={{wordBreak:'break-all',color:e.type==='trade'?'#22d3ee':e.type==='profit'?'#22c55e':e.type==='loss'?'#ef4444':e.type==='warn'?'#f59e0b':'#475569'}}>{e.msg}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // -- Layout ------------------------------------------------------------------
  return(
    <div style={{height:'100vh',background:'#050507',display:'flex',flexDirection:'column',maxWidth:'100vw',overflow:'hidden'}}>

      {/* HEADER */}
      <div style={{background:'#07070c',borderBottom:'1px solid #0f0f18',padding:'8px 16px',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:modeColor,boxShadow:'0 0 8px '+modeColor}} className={isActive?'pulse':''}/>
          <span style={{fontSize:17,fontWeight:700,letterSpacing:'0.12em',color:'#f1f5f9'}}>TFP</span>
          <span style={{fontSize:11,color:modeColor,border:'1px solid '+modeColor+'44',padding:'3px 8px',fontWeight:700,borderRadius:3}}>
            {dataMode==='live'?'LIVE':dataMode==='sim'?'SIM':dataMode==='demo'?'DEMO':dataMode==='connecting'?'...':'OFF'}
          </span>
          {/* Paper trading badge --- always visible in live mode */}
          {dataMode==='live'&&(
            <span style={{fontSize:10,color:'#fbbf24',border:'1px solid #fbbf2444',background:'#1c110033',padding:'3px 8px',fontWeight:700,borderRadius:3,letterSpacing:'0.06em'}}>PAPER</span>
          )}
          {isDemoMode&&<span style={{fontSize:11,color:'#a78bfa',border:'1px solid #a78bfa44',padding:'3px 8px',fontWeight:700,borderRadius:3}} className="pulse">DEMO {demoProgress}%</span>}
          <div style={{width:8,height:8,borderRadius:'50%',background:mktCol}} className={mktStatus.isOpen?'pulse':''}/>
          <span style={{fontSize:11,color:mktCol,fontWeight:700}}>{mktStatus.status}</span>
          <span style={{fontSize:11,color:'#475569'}}>{mktStatus.etTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'})} ET</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',marginLeft:'auto',flexWrap:'wrap'}}>
          {portfolio.loaded?(
            <>
              <span style={{fontSize:16,fontWeight:700,color:totalRet>=0?'#22c55e':'#ef4444'}}>${equity.toLocaleString('en-US',{maximumFractionDigits:0})}</span>
              <span style={{fontSize:12,color:totalRet>=0?'#16a34a':'#dc2626'}}>{totalRet>=0?'+':''}{totalRet.toFixed(2)}%</span>
            </>
          ):(
            <span style={{fontSize:13,color:'#334155'}}>-- Connect to load account --</span>
          )}
          {riskAlerts.filter(a=>a.level==='danger').length>0&&<span style={{fontSize:11,color:'#ef4444',border:'1px solid #ef444433',padding:'3px 8px',borderRadius:3}}>! {riskAlerts.filter(a=>a.level==='danger').length} ALERT</span>}
          {dataMode==='idle'
            ?<button onClick={connectLive} style={{padding:'7px 18px',fontSize:12,fontWeight:700,border:'1px solid #ca8a04',color:'#fbbf24',background:'#1c100044',cursor:'pointer',borderRadius:4}}>Connect Live</button>
            :<button onClick={()=>{setDataMode('idle');setAutoOn(false);wsRef.current?.close();addLog('[STREAM] Disconnected.');}} style={{padding:'7px 18px',fontSize:12,fontWeight:700,border:'1px solid #1e293b',color:'#475569',background:'transparent',cursor:'pointer',borderRadius:4}}>Disconnect</button>
          }
        </div>
      </div>

      {/* KPI BAR */}
      {!isMobile&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:1,background:'#0a0a10',borderBottom:'1px solid #0f0f18',flexShrink:0}}>
          {[
            {l:'EQUITY',v:portfolio.loaded?'$'+equity.toLocaleString('en-US',{maximumFractionDigits:0}):'--',s:(totalRet>=0?'+':'')+totalRet.toFixed(2)+'%',vc:totalRet>=0?'#22c55e':'#ef4444'},
            {l:'OPEN P&L',v:pnlFmt(openPnl),s:portfolio.positions.length+' open',vc:openPnl>=0?'#22c55e':'#ef4444'},
            {l:'REALISED',v:pnlFmt(realPnl),s:closed.length+' trades',vc:realPnl>=0?'#22d3ee':'#ef4444'},
            {l:'WIN RATE',v:winRate!=null?winRate+'%':'--',s:wins+'W '+(closed.length-wins)+'L',vc:'#a78bfa'},
            {l:'CASH',v:portfolio.loaded?'$'+(portfolio.cash||0).toLocaleString('en-US',{maximumFractionDigits:0}):'--',s:portfolio.loaded?((portfolio.cash/equity)*100||0).toFixed(0)+'%':'--',vc:'#fbbf24'},
            {l:'SIGNALS',v:buys.length+' BUY',s:'of 20',vc:'#facc15'},
          ].map(({l,v,s,vc},i)=>(
            <div key={i} style={{background:'#07070c',padding:'8px 14px'}}>
              <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'0.08em',color:'#334155',marginBottom:2}}>{l}</div>
              <div style={{fontSize:15,fontWeight:700,color:vc}}>{v}</div>
              <div style={{fontSize:10,color:'#475569',marginTop:1}}>{s}</div>
            </div>
          ))}
        </div>
      )}

      {/* RISK ALERTS */}
      {riskAlerts.length>0&&(
        <div style={{padding:'4px 12px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:'1px solid #0f0f18',background:'#07070c',flexShrink:0}}>
          {riskAlerts.map((a,i)=>(
            <span key={i} style={{fontSize:11,fontWeight:600,color:a.level==='danger'?'#ef4444':a.level==='warn'?'#fbbf24':'#60a5fa',border:'1px solid '+(a.level==='danger'?'#ef444433':a.level==='warn'?'#fbbf2433':'#60a5fa33'),padding:'3px 8px',borderRadius:3}}>{a.msg}</span>
          ))}
        </div>
      )}

      {/* MAIN BODY */}
      {isMobile?(
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden'}}>
          <div style={{flex:1,minHeight:0,overflow:'hidden'}}>
            {mobileTab==='chart'&&chartPanel}
            {mobileTab==='screener'&&screenerPanel}
            {mobileTab==='positions'&&positionsPanel}
            {mobileTab==='analytics'&&analyticsPanel}
            {mobileTab==='engine'&&rightPanel}
            {mobileTab==='log'&&logPanel}
            {mobileTab==='history'&&<HistoryPanel onSelectSym={s=>{setSelectedSym(s);setMobileTab('chart');}}/>}
          </div>
          <div style={{display:'flex',background:'#07070c',borderTop:'1px solid #0f0f18',flexShrink:0}}>
            {[['chart','~','Chart'],['screener','#','Scan'],['positions','$','Pos'],['analytics','%','Stats'],['engine','!','Engine']].map(([t,icon,label])=>(
              <button key={t} onClick={()=>setMobileTab(t)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'8px 0',borderTop:mobileTab===t?'2px solid #22d3ee':'2px solid transparent'}}>
                <span style={{fontSize:14,color:mobileTab===t?'#22d3ee':'#475569'}}>{icon}</span>
                <span style={{fontSize:9,color:mobileTab===t?'#22d3ee':'#475569',textTransform:'uppercase',fontWeight:700}}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      ):(
        <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 320px',minHeight:0,overflow:'hidden'}}>
          <div style={{display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden',borderRight:'1px solid #0f0f14'}}>
            <div style={{flex:'0 0 50%',minHeight:0,display:'flex',flexDirection:'column',borderBottom:'2px solid #0f0f18'}}>
              <div style={{background:'#07070c',display:'flex',borderBottom:'1px solid #0f0f18',flexShrink:0,overflowX:'auto'}}>
                {[['screener','Scanner'],['positions','Positions ('+portfolio.positions.length+')'],['analytics','Analytics'],['log','Trade Log'],['history','History']].map(([t,l])=>(
                  <button key={t} onClick={()=>setTab(t)}
                    style={{padding:'9px 16px',fontSize:12,fontWeight:700,
                      borderBottom:tab===t?'2px solid #22d3ee':'2px solid transparent',
                      color:tab===t?'#22d3ee':'#475569',
                      background:'none',border:'none',cursor:'pointer',whiteSpace:'nowrap'}}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{flex:1,minHeight:0,overflow:'hidden'}}>
                {tab==='screener'&&screenerPanel}
                {tab==='positions'&&positionsPanel}
                {tab==='analytics'&&analyticsPanel}
                {tab==='log'&&logPanel}
                {tab==='history'&&<HistoryPanel onSelectSym={s=>{setSelectedSym(s);}}/>}
              </div>
            </div>
            <div style={{flex:'0 0 50%',minHeight:0,display:'flex',flexDirection:'column',background:'#060608'}}>
              <div style={{display:'flex',gap:2,padding:'5px 10px',flexWrap:'wrap',borderBottom:'1px solid #0a0a12',background:'#07070c',flexShrink:0,overflowX:'auto'}}>
                {SEEDS.map(s=>(
                  <button key={s.symbol} onClick={()=>setSelectedSym(s.symbol)}
                    style={{padding:'3px 8px',fontSize:11,fontWeight:700,
                      border:'1px solid '+(selectedSym===s.symbol?TIER_COLOR[s.tier]+'88':'#111'),
                      color:selectedSym===s.symbol?TIER_COLOR[s.tier]:'#334155',
                      background:selectedSym===s.symbol?TIER_COLOR[s.tier]+'11':'transparent',
                      cursor:'pointer',borderRadius:3,whiteSpace:'nowrap'}}>
                    {s.symbol}
                  </button>
                ))}
              </div>
              {demoControls}
              <div style={{flex:1,minHeight:0}}>
                <StockChart symbol={selectedSym} livePrice={livePrices.current[selectedSym]} demoData={isDemoMode?(demoAllDataRef.current[selectedSym]||[]):[]} isDemoMode={isDemoMode}/>
              </div>
            </div>
          </div>
          <div style={{minHeight:0,overflow:'hidden',background:'#07070c'}}>
            {rightPanel}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
